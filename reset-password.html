<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — RVnB</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --night:#141a2b; --amber:#f2a93b; --lane:#eeeae0; --sign-green:#356b52; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter',sans-serif; background:var(--night); color:var(--lane);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .box{background:#1d2438; padding:40px; border-radius:4px; width:100%; max-width:360px;}
  h1{font-family:'Oswald',sans-serif; text-transform:uppercase; color:var(--amber); font-size:22px; margin-bottom:6px;}
  .sub{font-size:13px; opacity:0.7; margin-bottom:20px;}
  form{display:flex; flex-direction:column; gap:12px;}
  input{padding:12px 14px; border:2px solid #3a4256; background:#141a2b; color:var(--lane); border-radius:2px; font-family:'Inter',sans-serif;}
  button[type=submit]{padding:13px; background:var(--amber); color:var(--night); font-weight:700; text-transform:uppercase; font-size:13px; border:none; border-radius:2px; cursor:pointer;}
  button[type=submit]:disabled{opacity:0.6;}
  .msg{font-size:13px; margin-top:4px; display:none; padding:10px; border-radius:2px;}
  .msg.show{display:block;}
  .msg.error{color:#ff9d7a; background:#402020;}
  .msg.success{color:#8fd8ac; background:#20402f;}
  a.back{display:block; text-align:center; margin-top:18px; font-size:13px; color:var(--lane); opacity:0.6; text-decoration:none;}
</style>
</head>
<body>

<div class="box">
  <h1>Reset Password</h1>
  <div class="sub" id="sub-text">Enter a new password for your account.</div>

  <form id="reset-form">
    <input type="password" id="new-password" placeholder="New password (min 6 characters)" minlength="6" required>
    <input type="password" id="confirm-password" placeholder="Confirm new password" minlength="6" required>
    <button type="submit" id="reset-btn">Set New Password</button>
    <div class="msg" id="reset-msg"></div>
  </form>

  <a class="back" href="index.html">← Back to home</a>
</div>

<script>
  const SUPABASE_URL = 'https://icnhpciixqrhrqrzxkxg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljbmhwY2lpeHFyaHJxcnp4a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY2MDMsImV4cCI6MjA5OTczMjYwM30.5a8nNSiSA7U89f2kGAHGNPPfYpFra0Ve7PIFtOq3GDk';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('reset-form');
  const msg = document.getElementById('reset-msg');
  const subText = document.getElementById('sub-text');

  // The recovery link from the email includes a token in the URL that
  // supabase-js automatically picks up and turns into a temporary session —
  // just for the purpose of setting a new password.
  let hasValidRecoverySession = false;

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if(event === 'PASSWORD_RECOVERY'){
      hasValidRecoverySession = true;
    }
  });

  // Fallback check in case the event already fired before this listener attached
  setTimeout(async () => {
    const { data } = await supabaseClient.auth.getSession();
    if(data.session) hasValidRecoverySession = true;
    if(!hasValidRecoverySession){
      subText.textContent = 'This reset link is invalid or has expired.';
      form.style.display = 'none';
      msg.className = 'msg show error';
      msg.textContent = 'Please request a new password reset link from the login page.';
    }
  }, 1500);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-btn');

    if(newPassword !== confirmPassword){
      msg.className = 'msg show error';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving...';

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    if(error){
      msg.className = 'msg show error';
      msg.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Set New Password';
      return;
    }

    msg.className = 'msg show success';
    msg.textContent = 'Password updated! You can now log in with your new password.';
    form.style.display = 'none';
  });
</script>

</body>
</html>
