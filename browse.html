<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Spot — RVnB</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --night:#0B1220; --amber:#FFB547; --lane:#FAF7F0; --sign-green:#2F7D5B; --asphalt:#64748B;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--lane);}
  header{
    background:var(--night); color:var(--lane);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
    font-family:'Manrope',sans-serif; text-transform:uppercase; font-weight:700; letter-spacing:0.03em;
  }
  header a{color:var(--amber); text-decoration:none; font-size:14px;}
  #page-body{ display:flex; height:calc(100vh - 60px); position:relative; }
  #map{ flex:1; height:100%; min-width:0; }
  #carousel-panel{
    position:absolute; top:16px; right:16px; bottom:16px; width:320px;
    background:#fff; border-radius:20px; box-shadow:0 14px 40px rgba(11,18,32,0.22);
    overflow-y:auto; display:flex; flex-direction:column; z-index:450;
  }
  @media(max-width:820px){
    #carousel-panel{
      top:auto; left:0; right:0; bottom:0; width:auto;
      max-height:44vh; border-radius:20px 20px 0 0;
    }
    #carousel-header{ border-radius:20px 20px 0 0; padding:12px 16px; }
    #carousel-list{
      display:flex; gap:0; overflow-x:auto; overflow-y:hidden;
      padding:10px 0 4px; -webkit-overflow-scrolling:touch;
      scroll-snap-type:x mandatory;
    }
    .carousel-card{
      flex:0 0 100%; width:100%; margin-bottom:0;
      scroll-snap-align:center; box-sizing:border-box;
      padding:10px 20px;
    }
    .carousel-card img, .carousel-card .no-photo{ width:110px; height:110px; }
    #carousel-dots{
      display:flex; justify-content:center; gap:6px; padding:2px 0 12px;
    }
    #carousel-dots .dot{
      width:7px; height:7px; border-radius:50%; background:var(--lane-dim,#d8d3c4);
      cursor:pointer; transition:background 0.15s ease, transform 0.15s ease;
    }
    #carousel-dots .dot.active{ background:var(--amber); transform:scale(1.3); }
    /* Lift Leaflet's zoom control above the new bottom strip so they don't overlap */
    .leaflet-bottom.leaflet-left{ bottom:calc(44vh + 14px) !important; }
  }
  #carousel-header{
    padding:16px 18px; font-weight:700;
    font-size:13px; letter-spacing:0.02em; border-bottom:1px solid #eee; background:#fff;
    position:sticky; top:0; border-radius:20px 20px 0 0;
  }
  #carousel-count{font-family:'JetBrains Mono',monospace; font-weight:400; color:var(--asphalt); font-size:11px;}
  #carousel-list{padding:12px;}
  .carousel-card{
    display:flex; gap:10px; padding:10px; border:2px solid transparent; border-radius:14px;
    cursor:pointer; margin-bottom:8px; transition:border-color 0.15s ease, background 0.15s ease;
  }
  .carousel-card:hover, .carousel-card.active{ border-color:var(--amber); background:#fdf6e8; }
  .carousel-card img{
    width:74px; height:74px; object-fit:cover; border-radius:10px; flex-shrink:0; background:#e6e2d4;
  }
  .carousel-card .no-photo{
    width:74px; height:74px; border-radius:10px; flex-shrink:0; background:#e6e2d4;
    display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--asphalt);
    font-family:'JetBrains Mono',monospace; text-align:center;
  }
  .carousel-card .info{min-width:0;}
  .carousel-card h4{
    font-family:'Manrope',sans-serif; font-size:14px; text-transform:uppercase; margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .carousel-card .addr{
    font-size:12px; color:var(--asphalt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .carousel-card .price{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--sign-green); font-weight:700; margin-top:4px;
  }
  #carousel-dots{ display:none; }
  .carousel-empty{
    padding:30px 18px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--asphalt);
  }
  .map-pin-wrapper{ transition:transform 0.18s cubic-bezier(.34,1.56,.64,1); transform-origin:center bottom; }
  .map-pin-wrapper.pin-enlarged{
    transform:scale(2.2) translateY(-4px);
    filter:drop-shadow(0 6px 8px rgba(11,18,32,0.45));
    z-index:1000 !important;
  }
  .rv-popup{ font-family:'Inter',sans-serif; }
  .rv-popup h3{ font-family:'Manrope',sans-serif; font-size:15px; margin-bottom:4px; }
  .rv-popup .price{ color:var(--sign-green); font-weight:700; }
  .rv-popup .meta{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--asphalt); margin-top:4px; }
  #status{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--night); color:var(--lane); padding:10px 18px; border-radius:20px;
    font-family:'JetBrains Mono',monospace; font-size:12px; z-index:1000; display:none;
  }
  #search-bar{
    position:absolute; top:76px; left:50%; transform:translateX(-50%);
    z-index:1000; display:flex; gap:0; box-shadow:0 3px 10px rgba(0,0,0,0.25);
    border-radius:10px; overflow:hidden; width:90%; max-width:380px;
  }
  #search-input{
    flex:1; border:none; padding:12px 14px; font-family:'Inter',sans-serif; font-size:14px;
  }
  #search-btn{
    background:var(--amber); color:var(--night); border:none; padding:0 18px;
    font-weight:700; text-transform:uppercase; font-size:12px; cursor:pointer;
  }
  #search-clear{
    background:var(--asphalt); color:#fff; border:none; padding:0 14px; cursor:pointer; display:none;
  }
  #search-area-btn{
    position:absolute; top:128px; left:50%; transform:translateX(-50%);
    z-index:1000; background:var(--night); color:var(--amber); border:none;
    padding:9px 18px; border-radius:20px; font-family:'JetBrains Mono',monospace;
    font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em;
    cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.3); display:none;
  }
  #filters-toggle-btn{
    position:absolute; top:76px; left:16px; z-index:1000;
    background:#fff; color:var(--night); border:2px solid var(--night);
    padding:11px 16px; border-radius:10px; font-family:'Inter',sans-serif;
    font-size:13px; font-weight:600; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.15);
  }
  #filters-panel{
    position:absolute; top:128px; left:16px; z-index:1000;
    background:#fff; border:2px solid var(--night); border-radius:10px;
    padding:16px; width:250px; box-shadow:0 6px 16px rgba(0,0,0,0.2);
  }
  .filter-row{margin-bottom:14px;}
  .filter-row label{
    display:block; font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase;
    color:var(--asphalt); margin-bottom:6px; letter-spacing:0.04em;
  }
  .filter-row select, .filter-row input{
    width:100%; padding:9px 10px; border:2px solid var(--night); border-radius:10px; font-family:'Inter',sans-serif; font-size:13px;
  }
  #filters-apply-btn, #filters-clear-btn{
    flex:1; padding:9px; border:none; border-radius:10px; font-size:12px; font-weight:700;
    text-transform:uppercase; cursor:pointer;
  }
  #filters-apply-btn{background:var(--amber); color:var(--night);}
  #filters-clear-btn{background:#e6e6e6; color:var(--night);}
</style>

</head>
<body>

<header>
  <a href="index.html" style="color:inherit; text-decoration:none;">RVnB — Find a Spot</a>
  <a href="index.html">← Back to home</a>
</header>

<div id="search-bar">
  <input type="text" id="search-input" placeholder="Search city or business name...">
  <button id="search-clear">✕</button>
  <button id="search-btn">Search</button>
</div>
<button id="filters-toggle-btn">Filters ▾</button>
<div id="filters-panel" style="display:none;">
  <div class="filter-row">
    <label for="filter-type">Business type</label>
    <select id="filter-type">
      <option value="">All types</option>
      <option value="church">Church</option>
      <option value="gym">Gym</option>
      <option value="restaurant">Restaurant</option>
      <option value="office">Office</option>
      <option value="warehouse">Warehouse / Industrial</option>
      <option value="retail">Retail / Strip Mall</option>
      <option value="other">Other</option>
    </select>
  </div>
  <div class="filter-row">
    <label for="filter-rig-length">Your rig length (ft)</label>
    <input type="number" id="filter-rig-length" placeholder="e.g. 32" min="0">
  </div>
  <div class="filter-row">
    <label>Price per night</label>
    <div style="display:flex; gap:8px; align-items:center;">
      <input type="number" id="filter-min-price" placeholder="Min $" min="0">
      <span style="color:#8890a0;">–</span>
      <input type="number" id="filter-max-price" placeholder="Max $" min="0">
    </div>
  </div>
  <div style="display:flex; gap:8px;">
    <button id="filters-apply-btn">Apply</button>
    <button id="filters-clear-btn">Clear</button>
  </div>
</div>
<button id="search-area-btn">Search This Area</button>

<div id="page-body">
  <div id="map"></div>
  <div id="carousel-panel">
    <div id="carousel-header">Listings in view <span id="carousel-count"></span></div>
    <div id="carousel-list"></div>
    <div id="carousel-dots"></div>
  </div>
</div>
<div id="status">Loading spots...</div>

<script>
  // ============================================
  // CONFIG — paste your Supabase project values here
  // Find these in Supabase: Project Settings → API
  // ============================================
  const SUPABASE_URL = 'https://icnhpciixqrhrqrzxkxg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljbmhwY2lpeHFyaHJxcnp4a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY2MDMsImV4cCI6MjA5OTczMjYwM30.5a8nNSiSA7U89f2kGAHGNPPfYpFra0Ve7PIFtOq3GDk';

  const statusEl = document.getElementById('status');

  // Center map on Utah County by default
  const map = L.map('map', { zoomControl: false }).setView([40.35, -111.75], 10);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const amberIcon = L.divIcon({
    className: 'map-pin-wrapper',
    html: '<div style="background:#FFB547;width:16px;height:16px;border-radius:50%;border:3px solid #0B1220;"></div>',
    iconSize: [16,16],
  });

  const allMarkers = []; // { marker, data } — used by search to filter/re-center

  function formatTime12hr(hhmm){
    if(!hhmm) return '';
    const [h, m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    return `${hour12}:${String(m).padStart(2,'0')} ${period}`;
  }

  function renderCarousel(){
    const list = document.getElementById('carousel-list');
    const countEl = document.getElementById('carousel-count');
    const dotsEl = document.getElementById('carousel-dots');
    const visible = allMarkers.filter(({ marker }) => map.hasLayer(marker));

    countEl.textContent = visible.length > 0 ? `(${visible.length})` : '';

    if(visible.length === 0){
      list.innerHTML = '<div class="carousel-empty">No listings currently shown on the map.</div>';
      dotsEl.innerHTML = '';
      return;
    }

    list.innerHTML = '';
    dotsEl.innerHTML = '';

    visible.forEach(({ marker, data: p }, i) => {
      const photos = (p.photo_urls || '').split(',').map(s => s.trim()).filter(Boolean);
      const card = document.createElement('div');
      card.className = 'carousel-card';
      card.innerHTML = `
        ${photos.length > 0
          ? `<img src="${photos[0]}" alt="${p.business_name}">`
          : `<div class="no-photo">No photo</div>`}
        <div class="info">
          <h4>${p.business_name}</h4>
          <div class="addr">${p.address}, ${p.city}, ${p.state}</div>
          <div class="price">$${p.price_per_night}/night</div>
        </div>
      `;

      // Hovering the card enlarges the matching pin so it's easy to spot on the map
      card.addEventListener('mouseenter', () => {
        const el = marker.getElement();
        if(el) el.classList.add('pin-enlarged');
        card.classList.add('active');
      });
      card.addEventListener('mouseleave', () => {
        const el = marker.getElement();
        if(el) el.classList.remove('pin-enlarged');
        card.classList.remove('active');
      });
      card.addEventListener('click', () => {
        map.setView(marker.getLatLng(), Math.max(map.getZoom(), 14));
        marker.openPopup();
      });

      list.appendChild(card);

      // Dot indicator (only visible on mobile, via CSS) — tapping jumps to that card
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => {
        list.scrollTo({ left: card.offsetLeft - list.offsetLeft, behavior: 'smooth' });
      });
      dotsEl.appendChild(dot);
    });

    // Keep the dots in sync as the visitor swipes between cards
    const dots = Array.from(dotsEl.children);
    let scrollTimeout;
    list.addEventListener('scroll', () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        const cards = Array.from(list.children);
        const listCenter = list.scrollLeft + list.clientWidth / 2;
        let closestIndex = 0;
        let closestDistance = Infinity;
        cards.forEach((card, i) => {
          const cardCenter = card.offsetLeft - list.offsetLeft + card.offsetWidth / 2;
          const distance = Math.abs(cardCenter - listCenter);
          if(distance < closestDistance){ closestDistance = distance; closestIndex = i; }
        });
        dots.forEach((d, i) => d.classList.toggle('active', i === closestIndex));
      }, 80);
    });
  }

  async function loadListings(){
    if(SUPABASE_URL.includes('YOUR_SUPABASE')){
      statusEl.style.display = 'block';
      statusEl.textContent = 'Connect your Supabase project (see comments in this file) to load real listings.';
      return;
    }

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    statusEl.style.display = 'block';
    statusEl.textContent = 'Loading spots...';

    const { data, error } = await supabaseClient
      .from('partners')
      .select('*')
      .eq('status', 'approved');

    if(error){
      statusEl.textContent = 'Could not load listings: ' + error.message;
      return;
    }

    statusEl.style.display = 'none';

    data.forEach(p => {
      const marker = L.marker([p.latitude, p.longitude], { icon: amberIcon }).addTo(map);
      const photos = (p.photo_urls || '').split(',').map(s => s.trim()).filter(Boolean);
      const thumb = photos.length > 0 ? `<img src="${photos[0]}" style="width:100%; height:90px; object-fit:cover; border-radius:10px; margin-bottom:6px;">` : '';
      marker.bindPopup(`
        <div class="rv-popup">
          ${thumb}
          <h3>${p.business_name}</h3>
          <div>${p.city}, ${p.state}</div>
          <div class="price">$${p.price_per_night}/night</div>
          <div class="meta">${p.spots_available} spot(s) · check-in ${formatTime12hr(p.arrival_time)} · check-out ${formatTime12hr(p.departure_time)}</div>
          <a href="listing.html?id=${p.id}&from=map" style="display:inline-block; margin-top:8px; background:#0B1220; color:#FFB547; padding:6px 12px; border-radius:10px; font-size:12px; font-weight:700; text-decoration:none; text-transform:uppercase;">View &amp; Book</a>
        </div>
      `);
      allMarkers.push({ marker, data: p });
    });

    if(data.length === 0){
      statusEl.style.display = 'block';
      statusEl.textContent = 'No approved listings yet — add one in Supabase to see it here.';
    }

    renderCarousel();
  }

  // ============================================
  // Search — matches listings by name/city first;
  // if nothing matches, treats the query as a place and re-centers the map there
  // ============================================
  const searchInput = document.getElementById('search-input');
  const searchBtn = document.getElementById('search-btn');
  const clearBtn = document.getElementById('search-clear');

  let activeTypeFilter = '';
  let activeMinPrice = null;
  let activeMaxPrice = null;
  let activeRigLength = null;

  function matchesFilters(data){
    if(activeTypeFilter && data.business_type !== activeTypeFilter) return false;
    if(activeMinPrice !== null && Number(data.price_per_night) < activeMinPrice) return false;
    if(activeMaxPrice !== null && Number(data.price_per_night) > activeMaxPrice) return false;
    // A listing with no stated limit is assumed to fit any rig
    if(activeRigLength !== null && data.max_rig_length_ft && Number(data.max_rig_length_ft) < activeRigLength) return false;
    return true;
  }

  function showAllMarkers(){
    allMarkers.forEach(({ marker }) => { if(!map.hasLayer(marker)) marker.addTo(map); });
    renderCarousel();
  }

  function applyAllVisibility(){
    const query = searchInput.value.trim().toLowerCase();
    const hasFilters = activeTypeFilter || activeMinPrice !== null || activeMaxPrice !== null || activeRigLength !== null;

    let matches = allMarkers;
    if(query){
      matches = matches.filter(({ data }) =>
        data.business_name.toLowerCase().includes(query) || data.city.toLowerCase().includes(query)
      );
    }
    matches = matches.filter(({ data }) => matchesFilters(data));

    allMarkers.forEach(({ marker }) => map.removeLayer(marker));
    matches.forEach(({ marker }) => marker.addTo(map));

    if(matches.length === 0){
      statusEl.style.display = 'block';
      statusEl.textContent = hasFilters || query ? 'No listings match your search/filters' : 'No approved listings yet';
      renderCarousel();
      return;
    }
    statusEl.style.display = 'none';

    if(matches.length === 1){
      moveMapProgrammatically(() => map.setView(matches[0].marker.getLatLng(), 13));
    } else {
      moveMapProgrammatically(() => map.fitBounds(L.featureGroup(matches.map(m => m.marker)).getBounds(), { padding: [40,40] }));
    }
    renderCarousel();
  }

  async function runSearch(){
    const query = searchInput.value.trim();
    if(!query){
      clearBtn.style.display = 'none';
      applyAllVisibility();
      return;
    }

    clearBtn.style.display = 'block';
    const q = query.toLowerCase();
    const matches = allMarkers.filter(({ data }) =>
      data.business_name.toLowerCase().includes(q) || data.city.toLowerCase().includes(q)
    ).filter(({ data }) => matchesFilters(data));

    if(matches.length > 0){
      applyAllVisibility();
      return;
    }

    // No listing matched by name/city — try treating it as a place to search
    // (only when no filters are active, since a place match ignoring filters would be confusing)
    const hasFilters = activeTypeFilter || activeMinPrice !== null || activeMaxPrice !== null || activeRigLength !== null;
    if(hasFilters){
      applyAllVisibility();
      return;
    }

    showAllMarkers();
    statusEl.style.display = 'block';
    statusEl.textContent = 'Searching for "' + query + '"...';
    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
      const results = await res.json();
      if(results.length > 0){
        moveMapProgrammatically(() => map.setView([parseFloat(results[0].lat), parseFloat(results[0].lon)], 11));
        statusEl.textContent = 'No exact listing match — showing the area for "' + query + '"';
        setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
      } else {
        statusEl.textContent = 'No results found for "' + query + '"';
        setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
      }
    } catch(err){
      statusEl.textContent = 'Search failed — please try again.';
    }
  }

  searchBtn.addEventListener('click', () => { areaBtn.style.display = 'none'; runSearch(); });
  searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ areaBtn.style.display = 'none'; runSearch(); } });
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    areaBtn.style.display = 'none';
    applyAllVisibility();
  });

  // ============================================
  // Filters panel — business type + price range
  // ============================================
  const filtersToggleBtn = document.getElementById('filters-toggle-btn');
  const filtersPanel = document.getElementById('filters-panel');
  filtersToggleBtn.addEventListener('click', () => {
    filtersPanel.style.display = filtersPanel.style.display === 'block' ? 'none' : 'block';
  });

  document.getElementById('filters-apply-btn').addEventListener('click', () => {
    activeTypeFilter = document.getElementById('filter-type').value;
    const minVal = document.getElementById('filter-min-price').value;
    const maxVal = document.getElementById('filter-max-price').value;
    const rigVal = document.getElementById('filter-rig-length').value;
    activeMinPrice = minVal !== '' ? Number(minVal) : null;
    activeMaxPrice = maxVal !== '' ? Number(maxVal) : null;
    activeRigLength = rigVal !== '' ? Number(rigVal) : null;
    filtersToggleBtn.textContent = (activeTypeFilter || activeMinPrice !== null || activeMaxPrice !== null || activeRigLength !== null) ? 'Filters ●' : 'Filters ▾';
    filtersPanel.style.display = 'none';
    applyAllVisibility();
  });

  document.getElementById('filters-clear-btn').addEventListener('click', () => {
    document.getElementById('filter-type').value = '';
    document.getElementById('filter-min-price').value = '';
    document.getElementById('filter-max-price').value = '';
    document.getElementById('filter-rig-length').value = '';
    activeTypeFilter = '';
    activeMinPrice = null;
    activeMaxPrice = null;
    activeRigLength = null;
    filtersToggleBtn.textContent = 'Filters ▾';
    filtersPanel.style.display = 'none';
    applyAllVisibility();
  });

  // ============================================
  // "Search This Area" — appears when the user drags or zooms the map
  // themselves (not when our own code moves it), and filters pins to
  // whatever's currently visible in the viewport
  // ============================================
  const areaBtn = document.getElementById('search-area-btn');
  let suppressAreaBtn = false; // true right after WE move the map programmatically

  map.on('dragend zoomend', () => {
    if(suppressAreaBtn){ suppressAreaBtn = false; return; }
    areaBtn.style.display = 'block';
  });

  areaBtn.addEventListener('click', () => {
    const bounds = map.getBounds();
    const visible = allMarkers.filter(({ marker }) => bounds.contains(marker.getLatLng()));

    allMarkers.forEach(({ marker }) => map.removeLayer(marker));
    visible.forEach(({ marker }) => marker.addTo(map));

    areaBtn.style.display = 'none';
    searchInput.value = '';
    clearBtn.style.display = 'block'; // lets them get back to "show everything"

    statusEl.style.display = 'block';
    statusEl.textContent = visible.length > 0
      ? visible.length + ' spot(s) in this area'
      : 'No listings in this area yet';
    setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
    renderCarousel();
  });

  // Helper so our own setView/fitBounds calls (search, initial load) don't trigger the button
  function moveMapProgrammatically(fn){
    suppressAreaBtn = true;
    fn();
  }


  loadListings();

  window.addEventListener('resize', () => { map.invalidateSize(); });
</script>

</body>
</html>
