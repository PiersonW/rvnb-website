<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Trips — RVnB</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --night:#0B1220; --amber:#FFB547; --lane:#FAF7F0; --sign-green:#2F7D5B;
    --asphalt:#64748B; --red:#a4472b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--lane); color:var(--night);}
  h1,h2,h3{font-family:'Manrope',sans-serif; text-transform:uppercase; letter-spacing:0.02em;}
  a{color:inherit;}
  .wrap{max-width:800px; margin:0 auto; padding:32px 24px 80px;}

  header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid var(--night);
  }
  header .btns{display:flex; gap:10px;}
  header a, header button{
    background:none; border:2px solid var(--asphalt); color:var(--asphalt);
    padding:8px 16px; font-size:12px; text-transform:uppercase; font-weight:700;
    border-radius:10px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center;
  }

  .section-title{
    font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--sign-green); margin:32px 0 14px;
  }
  .section-title:first-of-type{margin-top:0;}
  .empty{color:var(--asphalt); font-family:'JetBrains Mono',monospace; font-size:13px; padding:24px 0;}

  .card{background:#fff; border:2px solid var(--night); border-radius:10px; padding:20px; margin-bottom:14px;}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
  .card h3{font-size:17px;}
  .status{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; padding:3px 8px; border-radius:10px;}
  .status.pending{background:#f2e4c4; color:#8a6415;}
  .status.confirmed{background:#d8ebe0; color:var(--sign-green);}
  .status.cancelled{background:#f0dcd6; color:var(--red);}
  .status.completed{background:#dbe4ea; color:#3a5f7a;}
  .meta{font-size:13px; color:var(--asphalt); margin-top:6px; line-height:1.7;}
  .meta b{color:var(--night);}
  .card-actions{margin-top:14px; display:flex; gap:8px; flex-wrap:wrap;}
  .trip-details{
    margin-top:16px; padding-top:14px; border-top:1px solid #e8e2d4;
    display:grid; grid-template-columns:1fr 1fr; gap:10px 20px;
  }
  .detail-row{font-size:13px;}
  .detail-row.full{grid-column:1/-1;}
  .detail-label{
    display:block; font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase;
    color:var(--asphalt); margin-bottom:2px; letter-spacing:0.04em;
  }
  .turnover-reminder{
    margin-top:14px; background:#402a10; color:#f5c877; padding:10px 12px;
    border-radius:10px; font-size:12px; line-height:1.5;
  }
  .btn-view{
    padding:8px 16px; border-radius:10px; font-size:12px; font-weight:700; text-transform:uppercase;
    border:2px solid var(--night); color:var(--night); text-decoration:none; display:inline-flex; align-items:center;
  }
  .btn-cancel{
    padding:8px 16px; border-radius:10px; font-size:12px; font-weight:700; text-transform:uppercase;
    border:none; cursor:pointer; background:var(--red); color:#fff;
  }
</style>
  <!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "36911a5edb0f4bdf95ab6da85ceccd46"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <a href="index.html" style="font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.05em; color:var(--sign-green); text-decoration:none; display:block; margin-bottom:2px;">RVnB</a>
      <h1>My Trips</h1>
    </div>
    <div class="btns">
      <a href="index.html">← Home</a>
      <button id="logout-btn">Sign Out</button>
    </div>
  </header>

  <div class="section-title">Upcoming</div>
  <div id="upcoming-container"><div class="empty">Loading...</div></div>

  <div class="section-title">Past &amp; Cancelled</div>
  <div id="past-container"></div>
</div>

<script>
  const SUPABASE_URL = 'https://icnhpciixqrhrqrzxkxg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljbmhwY2lpeHFyaHJxcnp4a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY2MDMsImV4cCI6MjA5OTczMjYwM30.5a8nNSiSA7U89f2kGAHGNPPfYpFra0Ve7PIFtOq3GDk';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  async function init(){
    const { data } = await supabaseClient.auth.getSession();
    if(!data.session){
      window.location.href = 'traveler-login.html?return=traveler-dashboard.html';
      return;
    }
    currentUser = data.session.user;
    loadTrips();
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'traveler-login.html';
  });

  async function loadTrips(){
    const upcomingEl = document.getElementById('upcoming-container');
    const pastEl = document.getElementById('past-container');
    upcomingEl.innerHTML = '<div class="empty">Loading...</div>';
    pastEl.innerHTML = '';

    const { data, error } = await supabaseClient
      .from('bookings')
      .select('*, partners(id, business_name, city, state, address, arrival_time, departure_time, rules)')
      .eq('traveler_id', currentUser.id)
      .order('check_in', { ascending: true });

    if(error){
      upcomingEl.innerHTML = '<div class="empty">Could not load trips: ' + error.message + '</div>';
      return;
    }

    const today = new Date().toISOString().slice(0,10);
    const upcoming = data.filter(b => b.check_out >= today && b.status !== 'cancelled' && b.status !== 'completed');
    const past = data.filter(b => b.check_out < today || b.status === 'cancelled' || b.status === 'completed');

    upcomingEl.innerHTML = upcoming.length === 0 ? '<div class="empty">No upcoming trips yet — go find a spot!</div>' : '';
    upcoming.forEach(b => upcomingEl.appendChild(renderCard(b, true)));

    pastEl.innerHTML = past.length === 0 ? '<div class="empty">No past trips yet.</div>' : '';
    past.forEach(b => pastEl.appendChild(renderCard(b, false)));
  }

  function formatTime12hr(hhmm){
    if(!hhmm) return '';
    const [h, m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    return `${hour12}:${String(m).padStart(2,'0')} ${period}`;
  }

  function renderCard(b, allowCancel){
    const card = document.createElement('div');
    card.className = 'card';
    const p = b.partners;
    const spot = p ? p.business_name : 'Listing';
    const address = p ? `${p.address}, ${p.city}, ${p.state}` : '';
    card.innerHTML = `
      <div class="card-top">
        <div>
          <h3>${spot}</h3>
          <div class="meta">
            <b>${b.check_in} → ${b.check_out}</b><br>
            ${address}<br>
            $${b.total_charged ? Number(b.total_charged).toFixed(2) : Number(b.total_price).toFixed(2)} total (incl. fees &amp; tax)
          </div>
        </div>
        <span class="status ${b.status}">${b.status}</span>
      </div>

      ${p ? `
      <div class="trip-details">
        <div class="detail-row"><span class="detail-label">Arrive after</span><span>${formatTime12hr(p.arrival_time)}</span></div>
        <div class="detail-row"><span class="detail-label">Leave by</span><span>${formatTime12hr(p.departure_time)}</span></div>
        ${p.rules ? `<div class="detail-row full"><span class="detail-label">House rules</span><span>${p.rules}</span></div>` : ''}
      </div>
      <div class="turnover-reminder">⚠ Vehicle must leave the lot by ${formatTime12hr(p.departure_time)} each morning and may not return until ${formatTime12hr(p.arrival_time)} — every night of this stay, not just once.</div>
      ` : ''}

      <div class="card-actions">
        ${p ? `<a href="listing.html?id=${p.id}&from=trips" class="btn-view">View Listing</a>` : ''}
        ${allowCancel && b.status !== 'cancelled' ? `<button class="btn-cancel" data-id="${b.id}">Cancel Trip</button>` : ''}
      </div>
    `;
    const cancelBtn = card.querySelector('.btn-cancel');
    if(cancelBtn){
      cancelBtn.addEventListener('click', async () => {
        if(!confirm('Cancel this trip? The host will be notified.')) return;
        cancelBtn.disabled = true;
        cancelBtn.textContent = 'Cancelling...';
        const { data, error } = await supabaseClient.functions.invoke('traveler-cancel-booking', {
          body: { bookingId: cancelBtn.dataset.id, confirm: true }
        });
        if(error || (data && data.error)){
          alert('Could not cancel: ' + (data?.error || error?.message || 'unknown error'));
          cancelBtn.disabled = false;
          cancelBtn.textContent = 'Cancel Trip';
          return;
        }
        loadTrips();
      });
    }
    return card;
  }

  init();
</script>

</body>
</html>
