<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Dashboard — RVnB</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --night:#0B1220; --amber:#FFB547; --lane:#FAF7F0; --sign-green:#2F7D5B;
    --asphalt:#64748B; --red:#a4472b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--lane); color:var(--night);}
  h1,h2,h3{font-family:'Manrope',sans-serif; text-transform:uppercase; letter-spacing:0.02em;}
  .wrap{max-width:880px; margin:0 auto; padding:32px 24px 80px;}

  header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid var(--night);
  }
  header button{
    background:none; border:2px solid var(--asphalt); color:var(--asphalt);
    padding:8px 16px; font-size:12px; text-transform:uppercase; font-weight:700;
    border-radius:10px; cursor:pointer;
  }

  .tabs{display:flex; gap:0; border:2px solid var(--night); width:fit-content; margin-bottom:24px; border-radius:10px; overflow:hidden;}
  .tab-btn{padding:10px 20px; font-weight:700; font-size:12px; text-transform:uppercase; background:#fff; color:var(--night); border:none; cursor:pointer;}
  .tab-btn.active{background:var(--night); color:var(--amber);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .empty{color:var(--asphalt); font-family:'JetBrains Mono',monospace; font-size:13px; padding:40px 0; text-align:center;}
  .traveler-rating{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--amber); font-weight:400;
    vertical-align:middle;
  }
  .archive-toggle{
    width:100%; background:none; border:2px dashed var(--asphalt); color:var(--asphalt);
    padding:12px; margin:8px 0 16px; font-family:'JetBrains Mono',monospace; font-size:12px;
    text-transform:uppercase; letter-spacing:0.04em; border-radius:10px; cursor:pointer;
  }
  .archive-toggle:hover{border-color:var(--night); color:var(--night);}

  .kpi-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px;}
  @media(max-width:640px){.kpi-grid{grid-template-columns:1fr;}}
  .kpi-card{background:#fff; border:2px solid var(--night); border-radius:10px; padding:18px;}
  .kpi-label{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--asphalt); letter-spacing:0.05em;}
  .kpi-value{font-family:'Manrope',sans-serif; font-size:28px; margin-top:6px;}
  .kpi-sub{font-size:12px; color:var(--asphalt); margin-top:4px;}

  .chart-row{display:flex; align-items:flex-end; gap:10px; height:130px; margin:16px 0 28px;}
  .chart-bar-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
  .chart-bar{width:100%; background:var(--sign-green); border-radius:10px 2px 0 0; min-height:2px;}
  .chart-label{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--asphalt); margin-top:6px;}
  .chart-value{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--night); margin-bottom:4px;}

  table.revenue-table{width:100%; border-collapse:collapse; font-size:13px; background:#fff; border:2px solid var(--night); border-radius:10px; overflow:hidden;}
  table.revenue-table th, table.revenue-table td{text-align:left; padding:10px 12px; border-bottom:1px solid #e0ddd0;}
  table.revenue-table th{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--asphalt); background:#f5f2e9;}

  .card{background:#fff; border:2px solid var(--night); border-radius:10px; padding:20px; margin-bottom:16px;}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
  .card h3{font-size:18px;}
  .status{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; padding:3px 8px; border-radius:10px;}
  .status.pending{background:#f2e4c4; color:#8a6415;}
  .status.approved{background:#d8ebe0; color:var(--sign-green);}
  .status.paused{background:#e6e6e6; color:var(--asphalt);}
  .status.confirmed{background:#d8ebe0; color:var(--sign-green);}
  .status.cancelled{background:#f0dcd6; color:var(--red);}
  .status.completed{background:#dbe4ea; color:#3a5f7a;}
  .meta{font-size:13px; color:var(--asphalt); margin-top:6px; line-height:1.7;}

  .edit-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;}
  .edit-grid > div{min-width:0;}
  @media(max-width:520px){.edit-grid{grid-template-columns:1fr;}}
  input[type="time"], input[type="date"]{min-width:0; -webkit-min-logical-width:0;}
  .edit-grid label{
    font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--asphalt);
    display:block; margin-bottom:4px;
  }
  .edit-grid input, .edit-grid textarea{
    width:100%; padding:9px 11px; border:2px solid var(--night); border-radius:10px; font-family:'Inter',sans-serif; font-size:13px;
  }
  .edit-grid .full{grid-column:1/-1;}

  .card-actions{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .card-actions button{padding:9px 16px; border-radius:10px; font-size:12px; font-weight:700; text-transform:uppercase; border:none; cursor:pointer;}
  .btn-save{background:var(--night); color:var(--amber);}
  .btn-approve{background:var(--sign-green); color:#fff;}
  .btn-pause{background:#e6e6e6; color:var(--night);}
  .btn-reject{background:var(--red); color:#fff;}
  .save-msg{font-size:12px; margin-top:8px; color:var(--sign-green); display:none;}

  .blocked-section{margin-top:18px; padding-top:16px; border-top:2px solid #eee0cf;}
  .blocked-section h4{font-size:12px; letter-spacing:0.04em; margin-bottom:10px;}
  .blocked-list{display:flex; flex-direction:column; gap:8px; margin-bottom:12px;}
  .blocked-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:#faf5e9; border:2px solid var(--night); border-radius:8px; padding:8px 12px;
    font-family:'JetBrains Mono',monospace; font-size:12px;
  }
  .blocked-row .btn-unblock{
    background:none; border:none; color:var(--red); font-weight:700; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:12px; text-transform:uppercase;
  }
  .block-form{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .block-form > div{min-width:0;}
  @media(max-width:520px){.block-form{grid-template-columns:1fr;}}
  .block-form .full{grid-column:1/-1;}
  .block-form label{
    font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--asphalt);
    display:block; margin-bottom:4px;
  }
  .block-form input{
    width:100%; min-width:0; padding:9px 11px; border:2px solid var(--night); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:13px;
  }
  .btn-add-block{
    grid-column:1/-1; background:var(--night); color:var(--amber); border:none; padding:10px;
    font-weight:700; font-size:12px; text-transform:uppercase; border-radius:10px; cursor:pointer; margin-top:2px;
  }

  /* Calendar tab */
  .cal-toolbar{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    margin-bottom:14px; flex-wrap:wrap;
  }
  .cal-toolbar select{
    padding:9px 12px; border:2px solid var(--night); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:13px; background:#fff; max-width:100%;
  }
  .cal-nav{display:flex; align-items:center; gap:10px; font-family:'Manrope',sans-serif; font-weight:700; font-size:14px;}
  .cal-nav button{
    background:#fff; border:2px solid var(--night); color:var(--night); width:32px; height:32px;
    border-radius:8px; font-size:16px; cursor:pointer; line-height:1;
  }
  .cal-legend{display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--asphalt);}
  .legend-item{display:flex; align-items:center; gap:6px;}
  .legend-dot{width:12px; height:12px; border-radius:3px; display:inline-block; border:1px solid rgba(0,0,0,0.15);}
  .legend-dot.booked{background:#f0c9c0;}
  .legend-dot.blocked{background:#d9dde3;}
  .legend-dot.available{background:#d8ebe0;}

  .cal-grid{
    display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;
    background:#fff; border:2px solid var(--night); border-radius:10px; padding:14px;
  }
  .cal-dow{
    font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase;
    color:var(--asphalt); text-align:center; padding-bottom:6px;
  }
  .cal-cell{
    aspect-ratio:1/1; border-radius:8px; display:flex; align-items:flex-start; justify-content:flex-end;
    padding:5px 7px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--night);
    background:#d8ebe0; /* available */
  }
  .cal-cell.empty-cell{background:none;}
  .cal-cell.booked{background:#f0c9c0;}
  .cal-cell.blocked{background:#d9dde3;}
  .cal-cell.available{cursor:pointer; transition:box-shadow 0.1s ease;}
  .cal-cell.available:hover{box-shadow:inset 0 0 0 2px var(--sign-green);}
  .cal-cell.selected{background:#f2e4c4; box-shadow:inset 0 0 0 2px var(--night);}
  @media(max-width:520px){
    .cal-cell{font-size:10px; padding:3px 5px; border-radius:5px;}
    .cal-grid{gap:3px; padding:8px;}
  }

  .cal-hint{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--asphalt); margin-bottom:10px;
  }
  .cal-selection-bar{
    display:none; align-items:center; gap:10px; flex-wrap:wrap;
    background:#fff; border:2px solid var(--night); border-radius:10px; padding:12px 16px; margin-top:14px;
  }
  .cal-selection-bar.show{display:flex;}
  .cal-selection-bar #cal-selection-count{font-weight:700; font-size:13px;}
  .cal-selection-bar input{
    flex:1; min-width:140px; padding:9px 11px; border:2px solid var(--night); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:13px;
  }
  .cal-selection-bar button{
    padding:9px 16px; border-radius:10px; font-size:12px; font-weight:700; text-transform:uppercase; border:none; cursor:pointer;
  }
</style>

</head>
<body>

<div class="wrap">
  <header>
    <div>
      <a href="index.html" style="font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.05em; color:var(--amber); text-decoration:none; display:block; margin-bottom:2px;">RVnB</a>
      <h1>Host Dashboard</h1>
    </div>
    <div style="display:flex; gap:10px;">
      <a href="index.html" style="border:2px solid var(--asphalt); color:var(--asphalt); padding:8px 16px; font-size:12px; text-transform:uppercase; font-weight:700; border-radius:10px; text-decoration:none; display:inline-flex; align-items:center;">← Home</a>
      <button id="logout-btn">Sign Out</button>
    </div>
  </header>

  <div id="payout-banner" style="display:none; padding:16px 18px; border-radius:10px; margin-bottom:24px; font-size:14px;"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="listings">My Listings</button>
    <button class="tab-btn" data-tab="bookings">Bookings</button>
    <button class="tab-btn" data-tab="calendar">Calendar</button>
    <button class="tab-btn" data-tab="revenue">Revenue</button>
  </div>

  <div id="listings-container" class="tab-panel active"><div class="empty">Loading...</div></div>
  <div id="bookings-container" class="tab-panel"></div>
  <div id="calendar-container" class="tab-panel">
    <div class="cal-toolbar">
      <select id="cal-listing-select"></select>
      <div class="cal-nav">
        <button id="cal-prev" type="button">‹</button>
        <span id="cal-month-label"></span>
        <button id="cal-next" type="button">›</button>
      </div>
    </div>
    <div class="cal-legend">
      <span class="legend-item"><span class="legend-dot booked"></span>Booked</span>
      <span class="legend-item"><span class="legend-dot blocked"></span>Blocked</span>
      <span class="legend-item"><span class="legend-dot available"></span>Available</span>
    </div>
    <div class="cal-hint">Click available days to select them, then block them below.</div>
    <div id="cal-grid" class="cal-grid"></div>
    <div class="cal-selection-bar" id="cal-selection-bar">
      <span id="cal-selection-count"></span>
      <input type="text" id="cal-selection-note" placeholder="Note (optional)">
      <button class="btn-approve" id="cal-block-selected-btn">Block Selected Dates</button>
      <button class="btn-pause" id="cal-clear-selection-btn">Clear</button>
    </div>
  </div>
  <div id="revenue-container" class="tab-panel"></div>
</div>

<script>
  const SUPABASE_URL = 'https://icnhpciixqrhrqrzxkxg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljbmhwY2lpeHFyaHJxcnp4a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY2MDMsImV4cCI6MjA5OTczMjYwM30.5a8nNSiSA7U89f2kGAHGNPPfYpFra0Ve7PIFtOq3GDk';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  async function init(){
    const { data } = await supabaseClient.auth.getSession();
    if(!data.session){
      window.location.href = 'host-login.html?return=host-dashboard.html';
      return;
    }
    currentUser = data.session.user;
    loadListings();
    loadBookings();
    checkPayoutStatus();
    loadRevenue();
    loadCalendarTab();
  }

  async function checkPayoutStatus(){
    const banner = document.getElementById('payout-banner');
    const { data, error } = await supabaseClient.functions.invoke('refresh-connect-status', { body: {} });

    if(error || !data || data.error){
      let realMessage = data?.error || error?.message || 'unknown error';
      if(error?.context && typeof error.context.json === 'function'){
        try{
          const body = await error.context.json();
          if(body?.error) realMessage = body.error;
        } catch(e){ /* body wasn't JSON or already consumed */ }
      }
      banner.style.display = 'block';
      banner.style.background = '#fbeae0';
      banner.style.border = '2px solid #a4472b';
      banner.style.color = '#7a3520';
      banner.textContent = 'Could not check payout status: ' + realMessage;
      return;
    }

    banner.style.display = 'block';

    if(data.payoutsEnabled){
      banner.style.background = '#e4efe8';
      banner.style.border = '2px solid #2F7D5B';
      banner.style.color = '#1f4a35';
      banner.textContent = '✓ Payouts active — confirmed bookings will pay out to your bank automatically.';
    } else if(data.connected){
      banner.style.background = '#fbeccf';
      banner.style.border = '2px solid #e0983a';
      banner.style.color = '#6b4a10';
      banner.innerHTML = 'Your payout setup is incomplete. <button id="finish-payout-btn" style="background:#e0983a; color:#fff; border:none; padding:6px 14px; border-radius:10px; font-weight:700; cursor:pointer; margin-left:8px;">Finish Setup</button>';
      document.getElementById('finish-payout-btn').addEventListener('click', startPayoutOnboarding);
    } else {
      banner.style.background = '#141b2e';
      banner.style.border = '2px solid #FFB547';
      banner.style.color = '#FFB547';
      banner.innerHTML = 'You haven\'t set up payouts yet — bookings can still come in, but you won\'t get paid automatically until this is done. <button id="setup-payout-btn" style="background:#FFB547; color:#0B1220; border:none; padding:6px 14px; border-radius:10px; font-weight:700; cursor:pointer; margin-left:8px;">Set Up Payouts</button>';
      document.getElementById('setup-payout-btn').addEventListener('click', startPayoutOnboarding);
    }
  }

  async function startPayoutOnboarding(){
    const banner = document.getElementById('payout-banner');
    banner.textContent = 'Redirecting to Stripe...';

    const { data, error } = await supabaseClient.functions.invoke('create-connect-account', {
      body: { returnUrl: window.location.href }
    });

    if(error || !data || data.error){
      let realMessage = data?.error || error?.message || 'unknown error';
      // Supabase's generic error hides the actual response body — dig it out if present
      if(error?.context && typeof error.context.json === 'function'){
        try{
          const body = await error.context.json();
          if(body?.error) realMessage = body.error;
        } catch(e){ /* body wasn't JSON or already consumed */ }
      }
      banner.textContent = 'Could not start payout setup: ' + realMessage;
      return;
    }

    window.location.href = data.onboardingUrl;
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'host-login.html';
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + '-container').classList.add('active');
    });
  });

  async function loadRevenue(){
    const container = document.getElementById('revenue-container');
    container.innerHTML = '<div class="empty">Loading...</div>';

    // Get this host's own listing IDs first, since bookings don't store host_id directly
    const { data: myListings } = await supabaseClient
      .from('partners')
      .select('id, business_name')
      .eq('host_id', currentUser.id);

    if(!myListings || myListings.length === 0){
      container.innerHTML = '<div class="empty">No listings yet — revenue will show up here once you have bookings.</div>';
      return;
    }
    const listingNameById = {};
    myListings.forEach(l => listingNameById[l.id] = l.business_name);
    const listingIds = myListings.map(l => l.id);

    const { data: bookings, error } = await supabaseClient
      .from('bookings')
      .select('*')
      .in('partner_id', listingIds)
      .order('created_at', { ascending: false });

    if(error){
      container.innerHTML = '<div class="empty">Could not load revenue: ' + error.message + '</div>';
      return;
    }
    if(!bookings || bookings.length === 0){
      container.innerHTML = '<div class="empty">No bookings yet.</div>';
      return;
    }

    const paid = bookings.filter(b => b.payment_status === 'paid');
    const totalRevenue = paid.reduce((s,b) => s + Number(b.host_payout || 0), 0);

    const now = new Date();
    const thisMonthRevenue = paid
      .filter(b => { const d = new Date(b.created_at); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); })
      .reduce((s,b) => s + Number(b.host_payout || 0), 0);

    const pendingRevenue = bookings
      .filter(b => b.status === 'pending' || (b.status === 'confirmed' && b.payment_status !== 'paid'))
      .reduce((s,b) => s + Number(b.host_payout || 0), 0);

    // Monthly chart, last 6 months
    const months = [];
    for(let i=5; i>=0; i--){
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: d.getFullYear()+'-'+d.getMonth(), label: d.toLocaleDateString('en-US',{month:'short'}), total: 0 });
    }
    paid.forEach(b => {
      const d = new Date(b.created_at);
      const key = d.getFullYear()+'-'+d.getMonth();
      const m = months.find(m => m.key === key);
      if(m) m.total += Number(b.host_payout || 0);
    });
    const maxMonth = Math.max(...months.map(m => m.total), 1);

    container.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Total Earned</div>
          <div class="kpi-value">$${totalRevenue.toFixed(2)}</div>
          <div class="kpi-sub">${paid.length} paid booking${paid.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">This Month</div>
          <div class="kpi-value">$${thisMonthRevenue.toFixed(2)}</div>
          <div class="kpi-sub">${now.toLocaleDateString('en-US',{month:'long'})}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Pending</div>
          <div class="kpi-value">$${pendingRevenue.toFixed(2)}</div>
          <div class="kpi-sub">awaiting confirmation/payment</div>
        </div>
      </div>

      <h3 style="font-size:15px; margin-bottom:4px;">Last 6 Months</h3>
      <div class="chart-row">
        ${months.map(m => `
          <div class="chart-bar-wrap">
            <div class="chart-value">$${m.total.toFixed(0)}</div>
            <div class="chart-bar" style="height:${Math.max((m.total/maxMonth)*100, 2)}%;"></div>
            <div class="chart-label">${m.label}</div>
          </div>
        `).join('')}
      </div>

      <h3 style="font-size:15px; margin-bottom:12px;">All Transactions</h3>
      <table class="revenue-table">
        <thead><tr><th>Date</th><th>Listing</th><th>Guest</th><th>Dates</th><th>You Received</th><th>Status</th></tr></thead>
        <tbody>
          ${bookings.map(b => `
            <tr>
              <td>${new Date(b.created_at).toLocaleDateString()}</td>
              <td>${listingNameById[b.partner_id] || '—'}</td>
              <td>${b.guest_name}</td>
              <td>${b.check_in} → ${b.check_out}</td>
              <td>${b.payment_status === 'paid' ? '$' + Number(b.host_payout || 0).toFixed(2) : '—'}</td>
              <td><span class="status ${b.status}">${b.status}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  async function loadListings(){
    const container = document.getElementById('listings-container');
    container.innerHTML = '<div class="empty">Loading...</div>';

    const { data, error } = await supabaseClient.from('partners').select('*').eq('host_id', currentUser.id).order('created_at', { ascending: false });

    if(error){
      container.innerHTML = '<div class="empty">Could not load listings: ' + error.message + '</div>';
      return;
    }
    if(data.length === 0){
      container.innerHTML = '<div class="empty">You don\'t have any listings yet. <a href="list-your-lot.html">Add one →</a></div>';
      return;
    }

    const partnerIds = data.map(p => p.id);
    const { data: blockedData } = await supabaseClient
      .from('blocked_dates')
      .select('*')
      .in('partner_id', partnerIds)
      .order('start_date', { ascending: true });

    const blockedByPartner = {};
    (blockedData || []).forEach(b => {
      if(!blockedByPartner[b.partner_id]) blockedByPartner[b.partner_id] = [];
      blockedByPartner[b.partner_id].push(b);
    });

    container.innerHTML = '';
    data.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      const blocks = blockedByPartner[p.id] || [];
      card.innerHTML = `
        <div class="card-top">
          <h3>${p.business_name}</h3>
          <span class="status ${p.status}">${p.status}</span>
        </div>
        <div class="meta">${p.address}, ${p.city}, ${p.state}</div>

        <div class="edit-grid">
          <div><label>Price per night ($)</label><input type="number" class="f-price" value="${p.price_per_night}"></div>
          <div><label>Spots available</label><input type="number" class="f-spots" value="${p.spots_available}"></div>
          <div><label>Earliest arrival</label><input type="time" class="f-arrival" value="${p.arrival_time}"></div>
          <div><label>Latest departure</label><input type="time" class="f-departure" value="${p.departure_time}"></div>
          <div class="full"><label>Rules / notes</label><textarea class="f-rules" rows="2">${p.rules || ''}</textarea></div>
        </div>

        <div class="card-actions">
          <button class="btn-save" data-id="${p.id}">Save Changes</button>
          ${p.status === 'approved' ? `<button class="btn-pause" data-id="${p.id}" data-status="paused">Pause Listing</button>` : ''}
          ${p.status === 'paused' ? `<button class="btn-approve" data-id="${p.id}" data-status="approved">Reactivate</button>` : ''}
        </div>
        <div class="save-msg">Saved!</div>

        <div class="blocked-section">
          <h4>Blocked dates</h4>
          <div class="blocked-list">
            ${blocks.length === 0
              ? '<div class="empty" style="padding:8px 0;">No dates blocked — this listing is open every night.</div>'
              : blocks.map(b => `
                <div class="blocked-row">
                  <span>${b.start_date} → ${b.end_date}${b.note ? ' — ' + b.note : ''}</span>
                  <button class="btn-unblock" data-id="${b.id}" data-partner-id="${p.id}">Remove</button>
                </div>
              `).join('')}
          </div>
          <div class="block-form">
            <div>
              <label>Start date</label>
              <input type="date" class="f-block-start" data-partner-id="${p.id}">
            </div>
            <div>
              <label>End date</label>
              <input type="date" class="f-block-end" data-partner-id="${p.id}">
            </div>
            <div class="full">
              <label>Note (optional)</label>
              <input type="text" class="f-block-note" data-partner-id="${p.id}" placeholder="e.g. personal use, maintenance">
            </div>
            <button class="btn-add-block" data-partner-id="${p.id}">Block These Dates</button>
          </div>
          <div class="save-msg block-save-msg" data-partner-id="${p.id}"></div>
        </div>
      `;
      container.appendChild(card);
    });

    // Save edits
    document.querySelectorAll('.btn-save').forEach(btn => {
      btn.addEventListener('click', async () => {
        const card = btn.closest('.card');
        const id = btn.dataset.id;
        const { error } = await supabaseClient.from('partners').update({
          price_per_night: parseFloat(card.querySelector('.f-price').value),
          spots_available: parseInt(card.querySelector('.f-spots').value, 10),
          arrival_time: card.querySelector('.f-arrival').value,
          departure_time: card.querySelector('.f-departure').value,
          rules: card.querySelector('.f-rules').value.trim()
        }).eq('id', id);

        const saveMsg = card.querySelector('.save-msg');
        if(error){
          saveMsg.style.color = '#a4472b';
          saveMsg.textContent = 'Error: ' + error.message;
        } else {
          saveMsg.style.color = '#2F7D5B';
          saveMsg.textContent = 'Saved!';
        }
        saveMsg.style.display = 'block';
        setTimeout(() => saveMsg.style.display = 'none', 2500);
      });
    });

    // Pause / reactivate
    document.querySelectorAll('.btn-pause, .btn-approve').forEach(btn => {
      btn.addEventListener('click', async () => {
        await supabaseClient.from('partners').update({ status: btn.dataset.status }).eq('id', btn.dataset.id);
        loadListings();
      });
    });

    // Block dates
    document.querySelectorAll('.btn-add-block').forEach(btn => {
      btn.addEventListener('click', async () => {
        const partnerId = btn.dataset.partnerId;
        const card = btn.closest('.card');
        const start_date = card.querySelector(`.f-block-start[data-partner-id="${partnerId}"]`).value;
        const end_date = card.querySelector(`.f-block-end[data-partner-id="${partnerId}"]`).value;
        const note = card.querySelector(`.f-block-note[data-partner-id="${partnerId}"]`).value.trim();
        const msgEl = card.querySelector(`.block-save-msg[data-partner-id="${partnerId}"]`);

        if(!start_date || !end_date){
          msgEl.style.color = 'var(--red)';
          msgEl.textContent = 'Pick both a start and end date.';
          msgEl.style.display = 'block';
          return;
        }
        if(end_date <= start_date){
          msgEl.style.color = 'var(--red)';
          msgEl.textContent = 'End date must be after the start date.';
          msgEl.style.display = 'block';
          return;
        }

        const { error } = await supabaseClient.from('blocked_dates').insert({
          partner_id: partnerId, start_date, end_date, note: note || null
        });

        if(error){
          msgEl.style.color = 'var(--red)';
          msgEl.textContent = error.message.includes('already a booking')
            ? error.message
            : 'Error: ' + error.message;
          msgEl.style.display = 'block';
          return;
        }
        loadListings();
      });
    });

    // Unblock dates
    document.querySelectorAll('.btn-unblock').forEach(btn => {
      btn.addEventListener('click', async () => {
        if(!confirm('Remove this blocked date range? Travelers will be able to book these dates again.')) return;
        const { error } = await supabaseClient.from('blocked_dates').delete().eq('id', btn.dataset.id);
        if(error){ alert('Could not remove: ' + error.message); return; }
        loadListings();
      });
    });
  }

  let showArchivedBookings = false;

  async function loadBookings(){
    const container = document.getElementById('bookings-container');
    container.innerHTML = '<div class="empty">Loading...</div>';

    const { data, error } = await supabaseClient
      .from('bookings')
      .select('*, partners(business_name)')
      .order('created_at', { ascending: false });

    if(error){
      container.innerHTML = '<div class="empty">Could not load bookings: ' + error.message + '</div>';
      return;
    }
    if(data.length === 0){
      container.innerHTML = '<div class="empty">No booking requests yet.</div>';
      return;
    }

    const active = data.filter(b => b.status === 'pending' || b.status === 'confirmed');
    const archived = data.filter(b => b.status === 'cancelled' || b.status === 'completed');

    container.innerHTML = '';
    if(active.length === 0 && !showArchivedBookings){
      container.innerHTML = '<div class="empty">No active bookings right now.</div>';
    }
    active.forEach(b => container.appendChild(renderBookingCard(b)));

    if(archived.length > 0){
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'archive-toggle';
      toggleBtn.textContent = showArchivedBookings
        ? `Hide declined & completed (${archived.length})`
        : `Show declined & completed (${archived.length})`;
      toggleBtn.addEventListener('click', () => {
        showArchivedBookings = !showArchivedBookings;
        loadBookings();
      });
      container.appendChild(toggleBtn);

      if(showArchivedBookings){
        archived.forEach(b => container.appendChild(renderBookingCard(b)));
      }
    }

    attachBookingActionListeners();
    loadTravelerRatings(data);
  }

  async function loadTravelerRatings(bookings){
    const { data: reviews } = await supabaseClient
      .from('reviews')
      .select('traveler_email, rating')
      .eq('reviewer_type', 'host');
    if(!reviews || reviews.length === 0) return;

    const byEmail = {};
    reviews.forEach(r => {
      if(!r.traveler_email) return;
      if(!byEmail[r.traveler_email]) byEmail[r.traveler_email] = [];
      byEmail[r.traveler_email].push(r.rating);
    });

    bookings.forEach(b => {
      const ratings = byEmail[b.guest_email];
      const el = document.getElementById('rating-' + b.id);
      if(!el || !ratings || ratings.length === 0) return;
      const avg = (ratings.reduce((s,r) => s+r, 0) / ratings.length).toFixed(1);
      el.textContent = `★ ${avg} (${ratings.length})`;
    });
  }

  function renderBookingCard(b){
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <h3>${b.guest_name} <span id="rating-${b.id}" class="traveler-rating"></span></h3>
          <span class="status ${b.status}">${b.status}</span>
        </div>
        <div class="meta">
          <b>${b.partners ? b.partners.business_name : ''}</b><br>
          ${b.check_in} → ${b.check_out} · You receive: $${b.host_payout ? Number(b.host_payout).toFixed(2) : Number(b.total_price).toFixed(2)}<br>
          ${b.guest_email}${b.guest_phone ? ' · ' + b.guest_phone : ''}
        </div>
        <div class="card-actions">
          ${b.status !== 'confirmed' && b.status !== 'cancelled' ? `<button class="btn-approve" data-id="${b.id}" data-action="capture">Confirm &amp; Charge</button>` : ''}
          ${b.status !== 'cancelled' ? `<button class="btn-reject" data-id="${b.id}" data-action="cancel">Decline</button>` : ''}
          ${b.status === 'confirmed' ? `<button class="btn-pause" data-id="${b.id}" data-action="complete">Mark Completed</button>` : ''}
        </div>
        <div class="action-msg" id="booking-msg-${b.id}" style="font-size:12px; margin-top:8px; display:none;"></div>
      `;
      return card;
  }

  async function sendReviewRequests(bookingId){
    const { data: booking } = await supabaseClient
      .from('bookings')
      .select('guest_name, guest_email, partners(business_name, host_id)')
      .eq('id', bookingId)
      .single();
    if(!booking) return;

    const reviewBase = 'https://tryrvnb.com/review.html?booking=' + bookingId;

    if(booking.guest_email){
      const { data, error } = await supabaseClient.functions.invoke('send-email', {
        body: {
          to: booking.guest_email,
          subject: `How was your stay at ${booking.partners.business_name}?`,
          html: `<p>Hi ${booking.guest_name},</p><p>Thanks for staying at <b>${booking.partners.business_name}</b> through RVnB. Mind leaving a quick review?</p><p><a href="${reviewBase}&as=traveler">Leave a review →</a></p>`
        }
      });
      if(error || (data && data.error)) console.error('Traveler review-request email failed:', data?.error || error?.message);
    }

    if(booking.partners && booking.partners.host_id){
      const { data: hostProfile } = await supabaseClient
        .from('profiles')
        .select('email')
        .eq('id', booking.partners.host_id)
        .single();
      if(hostProfile && hostProfile.email){
        const { data, error } = await supabaseClient.functions.invoke('send-email', {
          body: {
            to: hostProfile.email,
            subject: `How was hosting ${booking.guest_name}?`,
            html: `<p>Hi,</p><p>Your guest <b>${booking.guest_name}</b> just completed their stay. Mind leaving a quick review?</p><p><a href="${reviewBase}&as=host">Leave a review →</a></p>`
          }
        });
        if(error || (data && data.error)) console.error('Host review-request email failed:', data?.error || error?.message);
      }
    }
  }

  function attachBookingActionListeners(){
    document.querySelectorAll('#bookings-container .card-actions button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        const msgEl = document.getElementById('booking-msg-' + id);

        if(action === 'complete'){
          await supabaseClient.from('bookings').update({ status: 'completed' }).eq('id', id);
          sendReviewRequests(id);
          loadBookings();
          return;
        }

        const functionName = action === 'capture' ? 'capture-payment' : 'cancel-payment';
        const confirmMsg = action === 'capture'
          ? 'Confirm this booking and charge the traveler\'s card now?'
          : 'Decline this booking? Any card hold will be released.';
        if(!confirm(confirmMsg)) return;

        btn.disabled = true;
        btn.textContent = action === 'capture' ? 'Charging...' : 'Cancelling...';

        const { data, error } = await supabaseClient.functions.invoke(functionName, { body: { bookingId: id } });

        if(error || (data && data.error)){
          msgEl.style.display = 'block';
          msgEl.style.color = '#a4472b';
          msgEl.textContent = 'Failed: ' + (data?.error || error?.message || 'unknown error');
          btn.disabled = false;
          btn.textContent = action === 'capture' ? 'Confirm & Charge' : 'Decline';
          return;
        }

        const emailError = await notifyTraveler(id, action);
        if(emailError){
          alert('Booking updated, but the traveler email failed to send:\n' + emailError);
        }
        loadBookings();
      });
    });
  }

  function formatTime12hr(hhmm){
    if(!hhmm) return '';
    const [h, m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    return `${hour12}:${String(m).padStart(2,'0')} ${period}`;
  }

  async function notifyTraveler(bookingId, action){
    const { data: booking } = await supabaseClient
      .from('bookings')
      .select('guest_name, guest_email, check_in, check_out, total_charged, partners(business_name, address, city, state, arrival_time, departure_time, rules)')
      .eq('id', bookingId)
      .single();
    if(!booking || !booking.guest_email) return null;

    const p = booking.partners;
    const spot = p ? `${p.business_name} (${p.city}, ${p.state})` : 'your listing';

    const subject = action === 'capture'
      ? `Booking confirmed — ${spot}`
      : `Booking update — ${spot}`;

    const html = action === 'capture'
      ? `
        <p>Hi ${booking.guest_name},</p>
        <p>Your booking is confirmed! Your card has been charged. Here are your trip details:</p>
        <table style="border-collapse:collapse; margin:14px 0;">
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Location</td><td><b>${p ? p.business_name : ''}</b></td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Address</td><td>${p ? p.address + ', ' + p.city + ', ' + p.state : ''}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Check-in date</td><td>${booking.check_in}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Check-out date</td><td>${booking.check_out}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Arrive after</td><td>${p ? formatTime12hr(p.arrival_time) : ''}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Leave by</td><td>${p ? formatTime12hr(p.departure_time) : ''}</td></tr>
          ${booking.total_charged ? `<tr><td style="padding:4px 12px 4px 0; color:#555;">Total paid</td><td>$${Number(booking.total_charged).toFixed(2)}</td></tr>` : ''}
        </table>
        ${p && p.rules ? `<p><b>Host rules:</b><br>${p.rules}</p>` : ''}
        <p><b>⚠ Daily departure required.</b> Even for multi-night stays, your vehicle must leave the lot by <b>${p ? formatTime12hr(p.departure_time) : 'the departure time'}</b> each morning and may not return until <b>${p ? formatTime12hr(p.arrival_time) : 'the arrival time'}</b> that evening — every night of your stay, not just once.</p>
        <p>Safe travels!</p>
      `
      : `<p>Hi ${booking.guest_name},</p><p>Unfortunately your booking request at <b>${spot}</b> for ${booking.check_in} → ${booking.check_out} was not able to be confirmed. Your card was not charged — any authorization hold will be released automatically by your bank within a few days.</p><p>Feel free to look for another spot on RVnB.</p>`;

    const { data, error } = await supabaseClient.functions.invoke('send-email', {
      body: { to: booking.guest_email, subject, html }
    });
    if(error || (data && data.error)){
      const msg = data?.error || error?.message || 'unknown error';
      console.error('Traveler notification email failed:', msg);
      return msg;
    }
    return null;
  }

  // ============================================
  // CALENDAR TAB
  // ============================================
  let calPartners = [];
  let calPartnerId = null;
  let calBookings = [];
  let calBlocked = [];
  let calMonth = new Date();
  calMonth.setDate(1);
  let calSelectedDates = new Set();

  async function loadCalendarTab(){
    const sel = document.getElementById('cal-listing-select');
    const { data, error } = await supabaseClient
      .from('partners')
      .select('id, business_name')
      .eq('host_id', currentUser.id)
      .order('created_at', { ascending: false });

    if(error || !data || data.length === 0){
      document.getElementById('cal-grid').innerHTML = '<div class="empty">You don\'t have any listings yet.</div>';
      sel.innerHTML = '';
      return;
    }

    calPartners = data;
    sel.innerHTML = calPartners.map(p => `<option value="${p.id}">${p.business_name}</option>`).join('');
    calPartnerId = calPartners[0].id;
    sel.value = calPartnerId;

    await loadCalendarData();
    renderCalendarGrid();
  }

  async function loadCalendarData(){
    const [{ data: bookingsData }, { data: blockedData }] = await Promise.all([
      supabaseClient.from('bookings').select('check_in, check_out, guest_name').eq('partner_id', calPartnerId).neq('status', 'cancelled'),
      supabaseClient.from('blocked_dates').select('start_date, end_date, note').eq('partner_id', calPartnerId)
    ]);
    calBookings = bookingsData || [];
    calBlocked = blockedData || [];
  }

  function calDateStatus(dateStr){
    for(const b of calBookings){
      if(dateStr >= b.check_in && dateStr < b.check_out) return { type: 'booked', label: b.guest_name ? 'Booked — ' + b.guest_name : 'Booked' };
    }
    for(const bl of calBlocked){
      if(dateStr >= bl.start_date && dateStr < bl.end_date) return { type: 'blocked', label: bl.note ? 'Blocked — ' + bl.note : 'Blocked' };
    }
    return { type: 'available', label: 'Available' };
  }

  function renderCalendarGrid(){
    const grid = document.getElementById('cal-grid');
    const label = document.getElementById('cal-month-label');
    if(!calPartnerId){
      grid.innerHTML = '';
      return;
    }

    const year = calMonth.getFullYear();
    const month = calMonth.getMonth();
    label.textContent = calMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const firstWeekday = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-dow">${d}</div>`).join('');
    for(let i = 0; i < firstWeekday; i++){
      html += '<div class="cal-cell empty-cell"></div>';
    }
    for(let day = 1; day <= daysInMonth; day++){
      const dateStr = `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const status = calDateStatus(dateStr);
      const selectedClass = (status.type === 'available' && calSelectedDates.has(dateStr)) ? ' selected' : '';
      html += `<div class="cal-cell ${status.type}${selectedClass}" data-date="${dateStr}" title="${status.label}">${day}</div>`;
    }
    grid.innerHTML = html;
  }

  // Click-to-select: only "available" cells can be toggled. Booked/blocked
  // cells are already spoken for and aren't selectable.
  document.getElementById('cal-grid').addEventListener('click', (e) => {
    const cell = e.target.closest('.cal-cell');
    if(!cell || !cell.classList.contains('available')) return;
    const dateStr = cell.dataset.date;
    if(calSelectedDates.has(dateStr)){
      calSelectedDates.delete(dateStr);
      cell.classList.remove('selected');
    } else {
      calSelectedDates.add(dateStr);
      cell.classList.add('selected');
    }
    updateSelectionBar();
  });

  function updateSelectionBar(){
    const bar = document.getElementById('cal-selection-bar');
    const countEl = document.getElementById('cal-selection-count');
    if(calSelectedDates.size === 0){
      bar.classList.remove('show');
      return;
    }
    bar.classList.add('show');
    countEl.textContent = `${calSelectedDates.size} day${calSelectedDates.size === 1 ? '' : 's'} selected`;
  }

  function addOneDay(dateStr){
    const d = new Date(dateStr + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + 1);
    return d.toISOString().slice(0, 10);
  }

  // Group selected (possibly non-contiguous, possibly multi-month) dates
  // into contiguous ranges so each becomes one blocked_dates row.
  function groupIntoRanges(dateStrings){
    const sorted = [...dateStrings].sort();
    const ranges = [];
    let rangeStart = sorted[0];
    let prev = sorted[0];

    for(let i = 1; i < sorted.length; i++){
      const current = sorted[i];
      if(current === addOneDay(prev)){
        prev = current;
        continue;
      }
      ranges.push({ start_date: rangeStart, end_date: addOneDay(prev) });
      rangeStart = current;
      prev = current;
    }
    ranges.push({ start_date: rangeStart, end_date: addOneDay(prev) });
    return ranges;
  }

  document.getElementById('cal-block-selected-btn').addEventListener('click', async () => {
    if(calSelectedDates.size === 0) return;
    const btn = document.getElementById('cal-block-selected-btn');
    const note = document.getElementById('cal-selection-note').value.trim() || null;
    const ranges = groupIntoRanges(calSelectedDates);

    btn.disabled = true;
    btn.textContent = 'Blocking...';

    const { error } = await supabaseClient
      .from('blocked_dates')
      .insert(ranges.map(r => ({ partner_id: calPartnerId, start_date: r.start_date, end_date: r.end_date, note })));

    btn.disabled = false;
    btn.textContent = 'Block Selected Dates';

    if(error){
      alert(error.message.includes('already a booking') ? error.message : 'Could not block dates: ' + error.message);
      return;
    }

    calSelectedDates.clear();
    document.getElementById('cal-selection-note').value = '';
    updateSelectionBar();
    await loadCalendarData();
    renderCalendarGrid();
    loadListings(); // keep the Blocked Dates list on the Listings tab in sync
  });

  document.getElementById('cal-clear-selection-btn').addEventListener('click', () => {
    calSelectedDates.clear();
    updateSelectionBar();
    renderCalendarGrid();
  });

  document.getElementById('cal-listing-select').addEventListener('change', async (e) => {
    calPartnerId = e.target.value;
    calSelectedDates.clear();
    updateSelectionBar();
    await loadCalendarData();
    renderCalendarGrid();
  });

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth.setMonth(calMonth.getMonth() - 1);
    renderCalendarGrid();
  });

  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth.setMonth(calMonth.getMonth() + 1);
    renderCalendarGrid();
  });

  init();
</script>

</body>
</html>
