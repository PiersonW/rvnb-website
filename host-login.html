<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Login — RVnB</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  :root{ --night:#0B1220; --amber:#FFB547; --lane:#FAF7F0; --sign-green:#2F7D5B; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter',sans-serif; background:var(--night); color:var(--lane);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .box{background:#141b2e; padding:40px; border-radius:12px; width:100%; max-width:360px;}
  h1{font-family:'Manrope',sans-serif; text-transform:uppercase; color:var(--amber); font-size:22px; margin-bottom:6px;}
  .sub{font-size:13px; opacity:0.7; margin-bottom:20px;}
  .tabs{display:flex; gap:0; border:2px solid #3d4657; border-radius:10px; overflow:hidden; margin-bottom:20px;}
  .tab-btn{flex:1; padding:10px; background:#0B1220; color:var(--lane); border:none; font-size:12px; font-weight:700; text-transform:uppercase; cursor:pointer;}
  .tab-btn.active{background:var(--amber); color:var(--night);}
  form{display:flex; flex-direction:column; gap:12px;}
  form.hidden{display:none;}
  input{padding:12px 14px; border:2px solid #3d4657; background:#0B1220; color:var(--lane); border-radius:10px; font-family:'Inter',sans-serif;}
  button[type=submit], button[type=button]{padding:13px; background:var(--amber); color:var(--night); font-weight:700; text-transform:uppercase; font-size:13px; border:none; border-radius:10px; cursor:pointer;}
  button[type=submit]:disabled, button[type=button]:disabled{opacity:0.6;}
  .msg{font-size:12px; margin-top:4px; display:none;}
  .msg.show{display:block;}
  .msg.error{color:#ff9d7a;}
  .msg.success{color:#8fd8ac;}
  a.back{display:block; text-align:center; margin-top:18px; font-size:13px; color:var(--lane); opacity:0.6; text-decoration:none;}
</style>
  <!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "36911a5edb0f4bdf95ab6da85ceccd46"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>

<div class="box">
  <h1><a href="index.html" style="color:inherit; text-decoration:none;">RVnB</a> Host</h1>
  <div class="sub">Sign in to manage your listing and bookings.</div>

  <button type="button" id="google-signin-btn" style="width:100%; padding:12px; background:#fff; color:#0B1220; border:2px solid #3d4657; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:16px;">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.85.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.96 10.71a5.4 5.4 0 0 1 0-3.42V4.96H.96a9 9 0 0 0 0 8.08l3-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3 2.33C4.67 5.16 6.66 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px; color:#5a6472; font-size:11px; font-family:'JetBrains Mono',monospace; text-transform:uppercase;">
    <div style="flex:1; height:1px; background:#3d4657;"></div>or<div style="flex:1; height:1px; background:#3d4657;"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="login">Log In</button>
    <button class="tab-btn" data-tab="signup">Sign Up</button>
  </div>

  <form id="login-form">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <div class="cf-turnstile" data-sitekey="0x4AAAAAAD3dYgYRVK0pvWHm" data-callback="onLoginCaptcha"></div>
    <button type="button" id="login-submit-btn" onclick="window.doLogin()">Log In</button>
    <a href="#" id="forgot-password-link" style="font-size:12px; color:var(--lane); opacity:0.7; text-align:center; text-decoration:underline;">Forgot password?</a>
    <div class="msg" id="login-msg"></div>
    <div style="font-size:10px; color:#5a6472; font-family:monospace;" id="login-debug">debug: waiting</div>
    <script>document.getElementById('login-debug').textContent = 'debug: inline script ran (v2)';</script>
  </form>

  <form id="signup-form" class="hidden">
    <div style="position:absolute; left:-9999px;" aria-hidden="true">
      <label for="hp-signup">Leave this field blank</label>
      <input type="text" id="hp-signup" tabindex="-1" autocomplete="off">
    </div>
    <input type="text" id="signup-name" placeholder="Full name" required>
    <input type="email" id="signup-email" placeholder="Email" required>
    <input type="password" id="signup-password" placeholder="Password (min 6 characters)" minlength="6" required>
    <div class="cf-turnstile" data-sitekey="0x4AAAAAAD3dYgYRVK0pvWHm" data-callback="onSignupCaptcha"></div>
    <label style="display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--lane); opacity:0.85; cursor:pointer;">
      <input type="checkbox" id="signup-terms-checkbox" style="margin-top:2px; flex-shrink:0; width:15px; height:15px;">
      <span>I agree to RVnB's <a href="terms.html" target="_blank" style="color:var(--amber); text-decoration:underline;">Terms of Service</a>.</span>
    </label>
    <button type="button" id="signup-submit-btn" onclick="doSignup()">Create Account</button>
    <div class="msg" id="signup-msg"></div>
  </form>

  <a class="back" href="index.html">← Back to home</a>
</div>

<script>
  // Show something visible immediately if this script is even running at all
  document.addEventListener('DOMContentLoaded', () => {
    const d = document.getElementById('login-debug');
    if(d && d.textContent === 'debug: waiting') d.textContent = 'debug: page scripts loaded ok';
  });

  let supabaseClient;
  try{
    const SUPABASE_URL = 'https://icnhpciixqrhrqrzxkxg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljbmhwY2lpeHFyaHJxcnp4a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY2MDMsImV4cCI6MjA5OTczMjYwM30.5a8nNSiSA7U89f2kGAHGNPPfYpFra0Ve7PIFtOq3GDk';
    if(typeof window.supabase === 'undefined'){
      throw new Error('Supabase library failed to load — check internet connection or ad blocker');
    }
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(initErr){
    document.body.innerHTML = '<div style="max-width:400px; margin:60px auto; padding:24px; background:#402020; color:#ff9d7a; border-radius:12px; font-family:monospace; font-size:13px;">' +
      '<b>Page failed to load properly:</b><br><br>' + initErr.message +
      '<br><br>Try refreshing the page, checking your internet connection, or disabling any ad blocker / privacy extension for this site.</div>';
    throw initErr;
  }

  const params = new URLSearchParams(window.location.search);
  const returnTo = params.get('return') || 'host-dashboard.html';

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('login-form').classList.toggle('hidden', btn.dataset.tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', btn.dataset.tab !== 'signup');
    });
  });

  // Already logged in? (Also fires right after a Google sign-in redirects back here.)
  supabaseClient.auth.getSession().then(async ({ data }) => {
    if(data.session){
      // Google sign-in skips our normal signup flow, so make sure a profile row exists
      await supabaseClient.from('profiles').upsert({
        id: data.session.user.id,
        email: data.session.user.email,
        full_name: data.session.user.user_metadata?.full_name || data.session.user.user_metadata?.name || '',
        role: 'host'
      }, { onConflict: 'id', ignoreDuplicates: true });
      window.location.href = returnTo;
    }
  });

  document.getElementById('google-signin-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/host-login.html?return=' + encodeURIComponent(returnTo) }
    });
  });

  // Captcha tokens, captured via the widget callbacks
  let loginCaptchaToken = null;
  let signupCaptchaToken = null;
  function onLoginCaptcha(token){
    loginCaptchaToken = token;
    const d = document.getElementById('login-debug');
    if(d) d.textContent = 'debug: captcha token received ✓';
  }
  function onSignupCaptcha(token){ signupCaptchaToken = token; }

  // If the Turnstile script itself fails to load (ad blocker, network issue, etc),
  // let people know clearly instead of the page just silently not working
  setTimeout(() => {
    if(typeof window.turnstile === 'undefined'){
      document.querySelectorAll('.cf-turnstile').forEach(el => {
        el.innerHTML = '<div style="color:#ff9d7a; font-size:12px;">Verification widget failed to load. Please disable any ad blocker or tracking protection for this site and refresh the page.</div>';
      });
    }
  }, 4000);

  // Log in
  document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('login-msg');
    const email = document.getElementById('login-email').value.trim();

    if(!email){
      msg.className = 'msg show error';
      msg.textContent = 'Enter your email above first, then click "Forgot password?"';
      return;
    }

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://tryrvnb.com/reset-password.html'
    });

    msg.className = 'msg show success';
    // Same message whether or not the email exists — don't reveal which emails have accounts
    msg.textContent = 'If an account exists for that email, a password reset link has been sent.';
  });

  window.doLogin = async function(){
    try{
      const debugEl = document.getElementById('login-debug');
      debugEl.style.color = '#ff9d7a';
      debugEl.textContent = 'debug: doLogin() called ✓';

      const msg = document.getElementById('login-msg');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if(!email || !password){
        msg.className = 'msg show error';
        msg.textContent = 'Please enter both email and password.';
        debugEl.textContent = 'debug: missing email/password';
        return;
      }

      if(!loginCaptchaToken){
        msg.className = 'msg show error';
        msg.textContent = 'Please complete the verification check above before logging in.';
        debugEl.textContent = 'debug: no captcha token yet';
        return;
      }

      debugEl.textContent = 'debug: calling supabase...';

      const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out after 10s — possible network/ad-blocker issue')), 10000));
      const authCall = supabaseClient.auth.signInWithPassword({
        email, password,
        options: { captchaToken: loginCaptchaToken }
      });

      const { error } = await Promise.race([authCall, timeout]);

      debugEl.textContent = 'debug: got response';

      if(error){
        msg.className = 'msg show error';
        msg.textContent = error.message;
        debugEl.textContent = 'debug: error — ' + error.message;
        if(window.turnstile) window.turnstile.reset();
        loginCaptchaToken = null;
        return;
      }
      debugEl.textContent = 'debug: success, redirecting...';
      window.location.href = returnTo;
    } catch(err){
      const debugEl = document.getElementById('login-debug');
      if(debugEl) debugEl.textContent = 'debug: CRASH — ' + err.message;
      const msg = document.getElementById('login-msg');
      if(msg){ msg.className = 'msg show error'; msg.textContent = 'Something went wrong: ' + err.message; }
    }
  };

  // Sign up
  async function doSignup(){
    const msg = document.getElementById('signup-msg');

    if(document.getElementById('hp-signup').value !== ''){
      return; // silently drop suspected bot submissions
    }

    const email = document.getElementById('signup-email').value.trim();
    const name = document.getElementById('signup-name').value.trim();
    const password = document.getElementById('signup-password').value;

    if(!email || !password || !name){
      msg.className = 'msg show error';
      msg.textContent = 'Please fill in your name, email, and password.';
      return;
    }

    if(!document.getElementById('signup-terms-checkbox').checked){
      msg.className = 'msg show error';
      msg.textContent = 'Please agree to the Terms of Service to create an account.';
      return;
    }

    if(!signupCaptchaToken){
      msg.className = 'msg show error';
      msg.textContent = 'Please complete the verification check above before creating an account.';
      return;
    }

    try{
      const { data, error } = await supabaseClient.auth.signUp({
        email, password,
        options: { captchaToken: signupCaptchaToken }
      });
      if(error){
        msg.className = 'msg show error';
        msg.textContent = error.message;
        if(window.turnstile) window.turnstile.reset();
        signupCaptchaToken = null;
        return;
      }

      // Create the matching profile row
      if(data.user){
        const { error: profileError } = await supabaseClient.from('profiles').insert({
          id: data.user.id,
          email: email,
          full_name: name,
          role: 'host',
          terms_accepted_at: new Date().toISOString()
        });
        if(profileError){
          console.error('Profile creation failed:', profileError.message);
          supabaseClient.functions.invoke('send-email', {
            body: {
              to: 'pierson.willhite@gmail.com',
              subject: '⚠ Profile creation failed for new host signup',
              html: `<p>A new host account was created (${email}) but the profiles row failed to save:</p><p>${profileError.message}</p><p>Run a fix similar to fix-melissa-profile.sql for this email (using role 'host').</p>`
            }
          }).catch(() => {});
        }
      }

      msg.className = 'msg show success';
      msg.textContent = 'Account created! Redirecting...';
      setTimeout(() => { window.location.href = returnTo; }, 1200);
    } catch(err){
      msg.className = 'msg show error';
      msg.textContent = 'Something went wrong: ' + err.message;
      if(window.turnstile) window.turnstile.reset();
      signupCaptchaToken = null;
    }
  }
</script>

</body>
</html>
