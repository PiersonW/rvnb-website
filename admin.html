<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — RVnB</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --night:#0B1220; --amber:#FFB547; --lane:#FAF7F0; --sign-green:#2F7D5B;
    --asphalt:#64748B; --red:#a4472b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--lane); color:var(--night);}
  h1{font-family:'Manrope',sans-serif; text-transform:uppercase; letter-spacing:0.02em;}
  .wrap{max-width:880px; margin:0 auto; padding:32px 24px 80px;}

  /* Login screen */
  #login-view{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--night);
  }
  .login-box{
    background:#141b2e; padding:40px; border-radius:12px; width:100%; max-width:340px;
    display:flex; flex-direction:column; gap:14px;
  }
  .login-box h1{color:var(--amber); font-size:22px; margin-bottom:6px;}
  .login-box p{color:var(--lane); font-size:13px; opacity:0.7; margin-bottom:10px;}
  .login-box input{
    padding:12px 14px; border:2px solid #3d4657; background:#0B1220; color:var(--lane);
    border-radius:10px; font-family:'Inter',sans-serif;
  }
  .login-box button{
    padding:13px; background:var(--amber); color:var(--night); font-weight:700;
    text-transform:uppercase; font-size:13px; border:none; border-radius:10px; cursor:pointer;
  }
  .login-error{color:#ff9d7a; font-size:12px; display:none;}

  /* Dashboard */
  #dashboard-view{display:none;}
  header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid var(--night);
  }
  header h1{font-size:24px;}
  header button{
    background:none; border:2px solid var(--asphalt); color:var(--asphalt);
    padding:8px 16px; font-size:12px; text-transform:uppercase; font-weight:700;
    border-radius:10px; cursor:pointer;
  }
  .empty{color:var(--asphalt); font-family:'JetBrains Mono',monospace; font-size:13px; padding:40px 0; text-align:center;}
  .traveler-rating{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--amber); font-weight:400;
    vertical-align:middle;
  }
  .archive-toggle{
    width:100%; background:none; border:2px dashed var(--asphalt); color:var(--asphalt);
    padding:12px; margin:8px 0 16px; font-family:'JetBrains Mono',monospace; font-size:12px;
    text-transform:uppercase; letter-spacing:0.04em; border-radius:10px; cursor:pointer;
  }
  .archive-toggle:hover{border-color:var(--night); color:var(--night);}

  .tabs{display:flex; gap:0; border:2px solid var(--night); width:fit-content; margin-bottom:24px; border-radius:10px; overflow:hidden;}
  .tab-btn{
    padding:10px 20px; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.03em;
    background:#fff; color:var(--night); border:none; cursor:pointer;
  }
  .tab-btn.active{background:var(--night); color:var(--amber);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .status.confirmed{background:#d8ebe0; color:var(--sign-green);}
  .status.cancelled{background:#f0dcd6; color:var(--red);}
  .status.completed{background:#dbe4ea; color:#3a5f7a;}

  .card{
    background:#fff; border:2px solid var(--night); border-radius:10px;
    padding:20px; margin-bottom:16px;
  }
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
  .card h3{font-family:'Manrope',sans-serif; font-size:18px; text-transform:uppercase;}
  .card .status{
    font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase;
    padding:3px 8px; border-radius:10px; letter-spacing:0.05em;
  }
  .status.pending{background:#f2e4c4; color:#8a6415;}
  .status.approved{background:#d8ebe0; color:var(--sign-green);}
  .status.paused{background:#e6e6e6; color:var(--asphalt);}
  .status.deleted{background:#f0dcd6; color:var(--red);}
  .status.waitlist{background:#d8ebe0; color:var(--sign-green);}
  .card .meta{font-size:13px; color:var(--asphalt); margin-top:6px; line-height:1.7;}
  .card .meta b{color:var(--night);}
  .card .rules{font-size:13px; color:var(--asphalt); margin-top:10px; font-style:italic;}
  .card-actions{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .card-actions button{
    padding:9px 16px; border-radius:10px; font-size:12px; font-weight:700; text-transform:uppercase;
    border:none; cursor:pointer;
  }
  .btn-approve{background:var(--sign-green); color:#fff;}
  .btn-pause{background:#e6e6e6; color:var(--night);}
  .btn-reject{background:var(--red); color:#fff;}

  /* Host Leads tab */
  .status.not_contacted{background:#e6e6e6; color:var(--asphalt);}
  .status.contacted{background:#dbe4ea; color:#3a5f7a;}
  .status.interested{background:#f2e4c4; color:#8a6415;}
  .status.listed{background:#d8ebe0; color:var(--sign-green);}
  .status.declined{background:#f0dcd6; color:var(--red);}

  .lead-toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
  .lead-filters{display:flex; gap:6px; flex-wrap:wrap;}
  .lead-filter-btn{
    background:#fff; border:2px solid var(--night); color:var(--night);
    padding:7px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:0.03em; border-radius:10px; cursor:pointer;
  }
  .lead-filter-btn.active{background:var(--night); color:var(--amber);}
  .btn-add-lead{
    background:var(--amber); color:var(--night); border:none; padding:9px 16px;
    font-weight:700; font-size:12px; text-transform:uppercase; border-radius:10px; cursor:pointer;
  }

  .add-lead-form{
    background:#fff; border:2px solid var(--night); border-radius:10px; padding:20px;
    margin-bottom:20px; display:none;
  }
  .add-lead-form.show{display:block;}
  .add-lead-form h3{font-family:'Manrope',sans-serif; font-size:15px; text-transform:uppercase; margin-bottom:14px;}
  .add-lead-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .add-lead-grid > div{min-width:0;}
  @media(max-width:520px){.add-lead-grid{grid-template-columns:1fr;}}
  .add-lead-grid label{
    font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--asphalt);
    display:block; margin-bottom:4px;
  }
  .add-lead-grid input, .add-lead-grid select, .add-lead-grid textarea{
    width:100%; min-width:0; padding:9px 11px; border:2px solid var(--night); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:13px;
  }
  .add-lead-grid .full{grid-column:1/-1;}
  .add-lead-actions{display:flex; gap:8px; margin-top:14px;}
  .btn-save-lead{background:var(--sign-green); color:#fff; border:none; padding:10px 18px; font-weight:700; font-size:12px; text-transform:uppercase; border-radius:10px; cursor:pointer;}
  .btn-cancel-lead{background:none; border:2px solid var(--asphalt); color:var(--asphalt); padding:10px 18px; font-weight:700; font-size:12px; text-transform:uppercase; border-radius:10px; cursor:pointer;}

  .lead-card{padding:16px 20px;}
  .lead-card .card-top{align-items:center;}
  .lead-card .meta a{color:var(--night);}
  .lead-summary{cursor:pointer; user-select:none;}
  .lead-summary h3{font-size:16px;}
  .lead-summary .meta{margin-top:2px;}
  .lead-caret{
    display:inline-block; color:var(--asphalt); font-size:14px; transition:transform 0.15s ease;
  }
  .lead-card.expanded .lead-caret{transform:rotate(180deg);}
  .lead-details{
    display:none; margin-top:16px; padding-top:16px; border-top:2px solid #eee0cf;
  }
  .lead-card.expanded .lead-details{display:block;}
  .lead-card .edit-grid{margin-top:0;}
  .lead-card .edit-grid label{
    font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--asphalt);
    display:block; margin-bottom:4px;
  }
  .lead-card .edit-grid select, .lead-card .edit-grid input, .lead-card .edit-grid textarea{
    width:100%; min-width:0; padding:9px 11px; border:2px solid var(--night); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:13px;
  }
  .lead-card .edit-grid .full{grid-column:1/-1;}
  .btn-quick{background:#e6e6e6; color:var(--night); border:none; padding:8px 14px; font-size:11px; font-weight:700; text-transform:uppercase; border-radius:10px; cursor:pointer;}
  .btn-quick.on{background:var(--amber);}
</style>

</head>
<body>

<div id="login-view">
  <div class="login-box">
    <h1><a href="index.html" style="color:inherit; text-decoration:none;">RVnB</a> Admin</h1>
    <p>Sign in to review host listings.</p>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button id="login-btn">Sign In</button>
    <div class="login-error" id="login-error">Incorrect email or password.</div>
  </div>
</div>

<div id="dashboard-view">
  <div class="wrap">
    <header>
      <div>
        <a href="index.html" style="font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.05em; color:var(--amber); text-decoration:none; display:block; margin-bottom:2px;">RVnB</a>
        <h1>Admin</h1>
      </div>
      <div style="display:flex; gap:10px;">
        <a href="analytics.html" style="border:2px solid var(--sign-green); color:var(--sign-green); padding:8px 16px; font-size:12px; text-transform:uppercase; font-weight:700; border-radius:10px; text-decoration:none; display:inline-flex; align-items:center;">Analytics</a>
        <a href="index.html" style="border:2px solid var(--asphalt); color:var(--asphalt); padding:8px 16px; font-size:12px; text-transform:uppercase; font-weight:700; border-radius:10px; text-decoration:none; display:inline-flex; align-items:center;">← Home</a>
        <button id="logout-btn">Sign Out</button>
      </div>
    </header>
    <div class="tabs">
      <button class="tab-btn active" data-tab="listings">Listings</button>
      <button class="tab-btn" data-tab="bookings">Bookings</button>
      <button class="tab-btn" data-tab="leads">Host Leads</button>
    </div>
    <div id="listings-container" class="tab-panel active"></div>
    <div id="bookings-container" class="tab-panel"></div>
    <div id="leads-container" class="tab-panel">
      <div class="lead-toolbar">
        <div class="lead-filters" id="lead-filters"></div>
        <button class="btn-add-lead" id="toggle-add-lead">+ Add Lead</button>
      </div>

      <div class="add-lead-form" id="add-lead-form">
        <h3>New Host Lead</h3>
        <div class="add-lead-grid">
          <div class="full">
            <label for="lead-business-name">Business name *</label>
            <input type="text" id="lead-business-name" required>
          </div>
          <div>
            <label for="lead-business-type">Type</label>
            <select id="lead-business-type">
              <option value="">Select...</option>
              <option value="storage">Storage facility</option>
              <option value="church">Church</option>
              <option value="gym">Gym</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label for="lead-city">City</label>
            <input type="text" id="lead-city">
          </div>
          <div>
            <label for="lead-contact-name">Contact name</label>
            <input type="text" id="lead-contact-name">
          </div>
          <div>
            <label for="lead-phone">Phone</label>
            <input type="tel" id="lead-phone">
          </div>
          <div>
            <label for="lead-email">Email</label>
            <input type="email" id="lead-email">
          </div>
          <div>
            <label for="lead-address">Address</label>
            <input type="text" id="lead-address">
          </div>
          <div class="full">
            <label for="lead-notes">Notes</label>
            <textarea id="lead-notes" rows="2"></textarea>
          </div>
        </div>
        <div class="add-lead-actions">
          <button class="btn-save-lead" id="save-lead-btn">Save Lead</button>
          <button class="btn-cancel-lead" id="cancel-lead-btn">Cancel</button>
        </div>
      </div>

      <div id="leads-list-container"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://icnhpciixqrhrqrzxkxg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljbmhwY2lpeHFyaHJxcnp4a3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNTY2MDMsImV4cCI6MjA5OTczMjYwM30.5a8nNSiSA7U89f2kGAHGNPPfYpFra0Ve7PIFtOq3GDk';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginView = document.getElementById('login-view');
  const dashboardView = document.getElementById('dashboard-view');
  const loginError = document.getElementById('login-error');
  const container = document.getElementById('listings-container');

  async function checkSession(){
    const { data } = await supabaseClient.auth.getSession();
    if(data.session){
      showDashboard();
    }
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error){
      loginError.style.display = 'block';
      loginError.textContent = error.message;
      return;
    }
    showDashboard();
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    location.reload();
  });

  function showDashboard(){
    loginView.style.display = 'none';
    dashboardView.style.display = 'block';
    loadListings();
    loadBookings();
    loadHostLeads();
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + '-container').classList.add('active');
    });
  });

  function formatTime12hr(hhmm){
    if(!hhmm) return '';
    const [h, m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    return `${hour12}:${String(m).padStart(2,'0')} ${period}`;
  }

  let showPausedListings = false;
  let showDeletedListings = false;
  let showWaitlistListings = false;

  async function loadListings(){
    container.innerHTML = '<div class="empty">Loading listings...</div>';
    const { data, error } = await supabaseClient
      .from('partners')
      .select('*')
      .order('created_at', { ascending: false });

    if(error){
      container.innerHTML = '<div class="empty">Could not load listings: ' + error.message + '</div>';
      return;
    }
    if(data.length === 0){
      container.innerHTML = '<div class="empty">No listings yet.</div>';
      return;
    }

    const active = data.filter(p => p.status !== 'paused' && p.status !== 'deleted' && p.status !== 'waitlist');
    const paused = data.filter(p => p.status === 'paused');
    const deleted = data.filter(p => p.status === 'deleted');
    const waitlist = data.filter(p => p.status === 'waitlist');

    container.innerHTML = '';

    if(active.length === 0 && !showPausedListings && !showDeletedListings && !showWaitlistListings){
      container.innerHTML = '<div class="empty">No active listings right now.</div>';
    }
    active.forEach(p => container.appendChild(renderListingCard(p)));

    if(waitlist.length > 0){
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'archive-toggle';
      toggleBtn.style.borderColor = 'var(--sign-green)';
      toggleBtn.style.color = 'var(--sign-green)';
      toggleBtn.textContent = showWaitlistListings
        ? `Hide waitlist — outside current market (${waitlist.length})`
        : `Show waitlist — outside current market (${waitlist.length})`;
      toggleBtn.addEventListener('click', () => {
        showWaitlistListings = !showWaitlistListings;
        loadListings();
      });
      container.appendChild(toggleBtn);
      if(showWaitlistListings){
        waitlist.forEach(p => container.appendChild(renderListingCard(p)));
      }
    }

    if(paused.length > 0){
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'archive-toggle';
      toggleBtn.textContent = showPausedListings
        ? `Hide paused listings (${paused.length})`
        : `Show paused listings (${paused.length})`;
      toggleBtn.addEventListener('click', () => {
        showPausedListings = !showPausedListings;
        loadListings();
      });
      container.appendChild(toggleBtn);
      if(showPausedListings){
        paused.forEach(p => container.appendChild(renderListingCard(p)));
      }
    }

    if(deleted.length > 0){
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'archive-toggle';
      toggleBtn.textContent = showDeletedListings
        ? `Hide deleted listings (${deleted.length})`
        : `Show deleted listings (${deleted.length})`;
      toggleBtn.addEventListener('click', () => {
        showDeletedListings = !showDeletedListings;
        loadListings();
      });
      container.appendChild(toggleBtn);
      if(showDeletedListings){
        deleted.forEach(p => container.appendChild(renderListingCard(p)));
      }
    }

    attachListingActionListeners();
  }

  function renderListingCard(p){
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div>
            <h3>${p.business_name}</h3>
            <div class="meta">
              <b>${p.address}, ${p.city}, ${p.state}</b><br>
              ${p.business_type || '—'} · ${p.spots_available} spot(s) · $${p.price_per_night}/night<br>
              Check-in ${formatTime12hr(p.arrival_time)} · Check-out ${formatTime12hr(p.departure_time)}<br>
              ${p.contact_name ? 'Contact: ' + p.contact_name + (p.contact_email ? ' (' + p.contact_email + ')' : '') : ''}
            </div>
            ${p.rules ? '<div class="rules">"' + p.rules + '"</div>' : ''}
          </div>
          <span class="status ${p.status}">${p.status}</span>
        </div>
        <div class="card-actions">
          ${p.status !== 'approved' ? `<button class="btn-approve" data-id="${p.id}" data-status="approved">${p.status === 'deleted' ? 'Restore' : 'Approve'}</button>` : ''}
          ${p.status !== 'paused' && p.status !== 'deleted' && p.status !== 'waitlist' ? `<button class="btn-pause" data-id="${p.id}" data-status="paused">Pause</button>` : ''}
          <button class="btn-reject" data-id="${p.id}" data-status="rejected">Delete</button>
        </div>
      `;
      return card;
  }

  function attachListingActionListeners(){
    document.querySelectorAll('.card-actions button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const status = btn.dataset.status;
        if(status === 'rejected'){
          if(!confirm('Delete this listing?')) return;

          // Check for real history first — never silently destroy booking/payment records
          const { count: bookingCount } = await supabaseClient
            .from('bookings').select('id', { count: 'exact', head: true }).eq('partner_id', id);
          const { count: reviewCount } = await supabaseClient
            .from('reviews').select('id', { count: 'exact', head: true }).eq('partner_id', id);

          if((bookingCount && bookingCount > 0) || (reviewCount && reviewCount > 0)){
            // Has real history — soft-delete instead of destroying records
            const { error } = await supabaseClient.from('partners').update({ status: 'deleted' }).eq('id', id);
            if(error){ alert('Could not hide listing: ' + error.message); return; }
            loadListings();
            return;
          }

          const { error } = await supabaseClient.from('partners').delete().eq('id', id);
          if(error){
            alert('Delete failed: ' + error.message);
            return;
          }
        } else {
          const { error } = await supabaseClient.from('partners').update({ status }).eq('id', id);
          if(error){
            alert('Update failed: ' + error.message);
            return;
          }
          if(status === 'approved') notifyHostOfApproval(id);
        }
        loadListings();
      });
    });
  }

  async function notifyHostOfApproval(partnerId){
    const { data: partner } = await supabaseClient
      .from('partners')
      .select('business_name, host_id')
      .eq('id', partnerId)
      .single();
    if(!partner || !partner.host_id) return;

    const { data: hostProfile } = await supabaseClient
      .from('profiles')
      .select('email')
      .eq('id', partner.host_id)
      .single();
    if(!hostProfile || !hostProfile.email) return;

    supabaseClient.functions.invoke('send-email', {
      body: {
        to: hostProfile.email,
        subject: `Your listing is live — ${partner.business_name}`,
        html: `<p>Hi,</p><p>Good news — <b>${partner.business_name}</b> has been approved and is now live on RVnB. Travelers can start booking it right away.</p><p>Check it out on your <a href="https://tryrvnb.com/host-dashboard.html">host dashboard</a>.</p>`
      }
    }).catch(() => {});
  }

  let showArchivedBookings = false;

  async function loadBookings(){
    const bContainer = document.getElementById('bookings-container');
    bContainer.innerHTML = '<div class="empty">Loading bookings...</div>';

    const { data, error } = await supabaseClient
      .from('bookings')
      .select('*, partners(business_name, city, state)')
      .order('created_at', { ascending: false });

    if(error){
      bContainer.innerHTML = '<div class="empty">Could not load bookings: ' + error.message + '</div>';
      return;
    }
    if(data.length === 0){
      bContainer.innerHTML = '<div class="empty">No booking requests yet.</div>';
      return;
    }

    const active = data.filter(b => b.status === 'pending' || b.status === 'confirmed');
    const archived = data.filter(b => b.status === 'cancelled' || b.status === 'completed');

    bContainer.innerHTML = '';

    if(active.length === 0 && !showArchivedBookings){
      bContainer.innerHTML = '<div class="empty">No active bookings right now.</div>';
    }
    active.forEach(b => bContainer.appendChild(renderBookingCard(b)));

    if(archived.length > 0){
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'archive-toggle';
      toggleBtn.textContent = showArchivedBookings
        ? `Hide declined & completed (${archived.length})`
        : `Show declined & completed (${archived.length})`;
      toggleBtn.addEventListener('click', () => {
        showArchivedBookings = !showArchivedBookings;
        loadBookings();
      });
      bContainer.appendChild(toggleBtn);

      if(showArchivedBookings){
        archived.forEach(b => bContainer.appendChild(renderBookingCard(b)));
      }
    }

    attachBookingActionListeners();
    loadTravelerRatings(data);
  }

  async function loadTravelerRatings(bookings){
    const { data: reviews } = await supabaseClient
      .from('reviews')
      .select('traveler_email, rating')
      .eq('reviewer_type', 'host');
    if(!reviews || reviews.length === 0) return;

    const byEmail = {};
    reviews.forEach(r => {
      if(!r.traveler_email) return;
      if(!byEmail[r.traveler_email]) byEmail[r.traveler_email] = [];
      byEmail[r.traveler_email].push(r.rating);
    });

    bookings.forEach(b => {
      const ratings = byEmail[b.guest_email];
      const el = document.getElementById('rating-' + b.id);
      if(!el || !ratings || ratings.length === 0) return;
      const avg = (ratings.reduce((s,r) => s+r, 0) / ratings.length).toFixed(1);
      el.textContent = `★ ${avg} (${ratings.length})`;
    });
  }

  function renderBookingCard(b){
      const card = document.createElement('div');
      card.className = 'card';
      const spot = b.partners ? `${b.partners.business_name} — ${b.partners.city}, ${b.partners.state}` : 'Unknown listing';
      card.innerHTML = `
        <div class="card-top">
          <div>
            <h3>${b.guest_name} <span id="rating-${b.id}" class="traveler-rating"></span></h3>
            <div class="meta">
              <b>${spot}</b><br>
              ${b.check_in} → ${b.check_out}<br>
              Traveler pays: $${(b.total_charged ?? b.total_price)?.toFixed ? (b.total_charged ?? b.total_price).toFixed(2) : (b.total_charged ?? b.total_price)} · Host gets: $${b.host_payout ? Number(b.host_payout).toFixed(2) : '—'} · RVnB: $${b.traveler_fee && b.host_fee ? (Number(b.traveler_fee) + Number(b.host_fee)).toFixed(2) : '—'}<br>
              ${b.guest_email}${b.guest_phone ? ' · ' + b.guest_phone : ''}
            </div>
          </div>
          <span class="status ${b.status}">${b.status}</span>
        </div>
        <div class="card-actions">
          ${b.status !== 'confirmed' && b.status !== 'cancelled' ? `<button class="btn-approve" data-id="${b.id}" data-action="capture">Confirm &amp; Charge</button>` : ''}
          ${b.status !== 'cancelled' ? `<button class="btn-reject" data-id="${b.id}" data-action="cancel">Decline</button>` : ''}
          ${b.status === 'confirmed' ? `<button class="btn-pause" data-id="${b.id}" data-action="complete">Mark Completed</button>` : ''}
        </div>
        <div class="action-msg" id="booking-msg-${b.id}" style="font-size:12px; margin-top:8px; display:none;"></div>
      `;
      return card;
  }

  async function sendReviewRequests(bookingId){
    const { data: booking } = await supabaseClient
      .from('bookings')
      .select('guest_name, guest_email, partners(business_name, host_id)')
      .eq('id', bookingId)
      .single();
    if(!booking) return;

    const reviewBase = 'https://tryrvnb.com/review.html?booking=' + bookingId;

    // Email the traveler, asking them to review the host
    if(booking.guest_email){
      const { data, error } = await supabaseClient.functions.invoke('send-email', {
        body: {
          to: booking.guest_email,
          subject: `How was your stay at ${booking.partners.business_name}?`,
          html: `<p>Hi ${booking.guest_name},</p><p>Thanks for staying at <b>${booking.partners.business_name}</b> through RVnB. Mind leaving a quick review?</p><p><a href="${reviewBase}&as=traveler">Leave a review →</a></p>`
        }
      });
      if(error || (data && data.error)) console.error('Traveler review-request email failed:', data?.error || error?.message);
    }

    // Email the host, asking them to review the traveler
    if(booking.partners && booking.partners.host_id){
      const { data: hostProfile } = await supabaseClient
        .from('profiles')
        .select('email')
        .eq('id', booking.partners.host_id)
        .single();
      if(hostProfile && hostProfile.email){
        const { data, error } = await supabaseClient.functions.invoke('send-email', {
          body: {
            to: hostProfile.email,
            subject: `How was hosting ${booking.guest_name}?`,
            html: `<p>Hi,</p><p>Your guest <b>${booking.guest_name}</b> just completed their stay. Mind leaving a quick review?</p><p><a href="${reviewBase}&as=host">Leave a review →</a></p>`
          }
        });
        if(error || (data && data.error)) console.error('Host review-request email failed:', data?.error || error?.message);
      }
    }
  }

  function attachBookingActionListeners(){
    document.querySelectorAll('#bookings-container .card-actions button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        const msgEl = document.getElementById('booking-msg-' + id);

        if(action === 'complete'){
          await supabaseClient.from('bookings').update({ status: 'completed' }).eq('id', id);
          sendReviewRequests(id);
          loadBookings();
          return;
        }

        const functionName = action === 'capture' ? 'capture-payment' : 'cancel-payment';
        const confirmMsg = action === 'capture'
          ? 'Confirm this booking and charge the traveler\'s card now?'
          : 'Decline this booking? Any card hold will be released.';
        if(!confirm(confirmMsg)) return;

        btn.disabled = true;
        btn.textContent = action === 'capture' ? 'Charging...' : 'Cancelling...';

        const { data, error } = await supabaseClient.functions.invoke(functionName, { body: { bookingId: id } });

        if(error || (data && data.error)){
          msgEl.style.display = 'block';
          msgEl.style.color = '#a4472b';
          msgEl.textContent = 'Failed: ' + (data?.error || error?.message || 'unknown error');
          btn.disabled = false;
          btn.textContent = action === 'capture' ? 'Confirm & Charge' : 'Decline';
          return;
        }

        const emailError = await notifyTraveler(id, action);
        if(emailError){
          alert('Booking updated, but the traveler email failed to send:\n' + emailError);
        }
        loadBookings();
      });
    });
  }

  async function notifyTraveler(bookingId, action){
    const { data: booking } = await supabaseClient
      .from('bookings')
      .select('guest_name, guest_email, check_in, check_out, total_charged, partners(business_name, address, city, state, arrival_time, departure_time, rules)')
      .eq('id', bookingId)
      .single();
    if(!booking || !booking.guest_email) return null;

    const p = booking.partners;
    const spot = p ? `${p.business_name} (${p.city}, ${p.state})` : 'your listing';

    const subject = action === 'capture'
      ? `Booking confirmed — ${spot}`
      : `Booking update — ${spot}`;

    const html = action === 'capture'
      ? `
        <p>Hi ${booking.guest_name},</p>
        <p>Your booking is confirmed! Your card has been charged. Here are your trip details:</p>
        <table style="border-collapse:collapse; margin:14px 0;">
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Location</td><td><b>${p ? p.business_name : ''}</b></td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Address</td><td>${p ? p.address + ', ' + p.city + ', ' + p.state : ''}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Check-in date</td><td>${booking.check_in}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Check-out date</td><td>${booking.check_out}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Arrive after</td><td>${p ? formatTime12hr(p.arrival_time) : ''}</td></tr>
          <tr><td style="padding:4px 12px 4px 0; color:#555;">Leave by</td><td>${p ? formatTime12hr(p.departure_time) : ''}</td></tr>
          ${booking.total_charged ? `<tr><td style="padding:4px 12px 4px 0; color:#555;">Total paid</td><td>$${Number(booking.total_charged).toFixed(2)}</td></tr>` : ''}
        </table>
        ${p && p.rules ? `<p><b>Host rules:</b><br>${p.rules}</p>` : ''}
        <p><b>⚠ Daily departure required.</b> Even for multi-night stays, your vehicle must leave the lot by <b>${p ? formatTime12hr(p.departure_time) : 'the departure time'}</b> each morning and may not return until <b>${p ? formatTime12hr(p.arrival_time) : 'the arrival time'}</b> that evening — every night of your stay, not just once.</p>
        <p>Safe travels!</p>
      `
      : `<p>Hi ${booking.guest_name},</p><p>Unfortunately your booking request at <b>${spot}</b> for ${booking.check_in} → ${booking.check_out} was not able to be confirmed. Your card was not charged — any authorization hold will be released automatically by your bank within a few days.</p><p>Feel free to look for another spot on RVnB.</p>`;

    const { data, error } = await supabaseClient.functions.invoke('send-email', {
      body: { to: booking.guest_email, subject, html }
    });
    if(error || (data && data.error)){
      const msg = data?.error || error?.message || 'unknown error';
      console.error('Traveler notification email failed:', msg);
      return msg;
    }
    return null;
  }

  // ============================================
  // HOST LEADS (outreach tracker)
  // ============================================
  const LEAD_STATUSES = ['not_contacted','contacted','interested','listed','declined'];
  const LEAD_STATUS_LABELS = {
    not_contacted: 'Not Contacted',
    contacted: 'Contacted',
    interested: 'Interested',
    listed: 'Listed',
    declined: 'Declined'
  };
  let currentLeadFilter = 'all';
  let allLeads = [];
  const expandedLeadIds = new Set();

  const addLeadForm = document.getElementById('add-lead-form');
  document.getElementById('toggle-add-lead').addEventListener('click', () => {
    addLeadForm.classList.toggle('show');
  });
  document.getElementById('cancel-lead-btn').addEventListener('click', () => {
    clearLeadForm();
    addLeadForm.classList.remove('show');
  });

  function clearLeadForm(){
    ['lead-business-name','lead-business-type','lead-city','lead-contact-name','lead-phone','lead-email','lead-address','lead-notes']
      .forEach(id => document.getElementById(id).value = '');
  }

  document.getElementById('save-lead-btn').addEventListener('click', async () => {
    const business_name = document.getElementById('lead-business-name').value.trim();
    if(!business_name){
      alert('Business name is required.');
      return;
    }
    const payload = {
      business_name,
      business_type: document.getElementById('lead-business-type').value || null,
      city: document.getElementById('lead-city').value.trim() || null,
      contact_name: document.getElementById('lead-contact-name').value.trim() || null,
      phone: document.getElementById('lead-phone').value.trim() || null,
      email: document.getElementById('lead-email').value.trim() || null,
      address: document.getElementById('lead-address').value.trim() || null,
      notes: document.getElementById('lead-notes').value.trim() || null,
      status: 'not_contacted'
    };
    const { error } = await supabaseClient.from('host_leads').insert(payload);
    if(error){
      alert('Could not save lead: ' + error.message);
      return;
    }
    clearLeadForm();
    addLeadForm.classList.remove('show');
    loadHostLeads();
  });

  function renderLeadFilters(){
    const filterBar = document.getElementById('lead-filters');
    const counts = { all: allLeads.length };
    LEAD_STATUSES.forEach(s => counts[s] = allLeads.filter(l => l.status === s).length);

    const chips = [{ key: 'all', label: 'All' }].concat(
      LEAD_STATUSES.map(s => ({ key: s, label: LEAD_STATUS_LABELS[s] }))
    );

    filterBar.innerHTML = chips.map(c => `
      <button class="lead-filter-btn ${currentLeadFilter === c.key ? 'active' : ''}" data-filter="${c.key}">
        ${c.label} (${counts[c.key] || 0})
      </button>
    `).join('');

    filterBar.querySelectorAll('.lead-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentLeadFilter = btn.dataset.filter;
        renderLeadFilters();
        renderLeadList();
      });
    });
  }

  function renderLeadList(){
    const listContainer = document.getElementById('leads-list-container');
    const visible = currentLeadFilter === 'all'
      ? allLeads
      : allLeads.filter(l => l.status === currentLeadFilter);

    if(visible.length === 0){
      listContainer.innerHTML = '<div class="empty">No leads here yet.</div>';
      return;
    }

    listContainer.innerHTML = '';
    visible.forEach(lead => listContainer.appendChild(renderLeadCard(lead)));
    attachLeadCardListeners();
  }

  async function loadHostLeads(){
    const listContainer = document.getElementById('leads-list-container');
    listContainer.innerHTML = '<div class="empty">Loading leads...</div>';

    const { data, error } = await supabaseClient
      .from('host_leads')
      .select('*')
      .order('last_touch_date', { ascending: true, nullsFirst: true })
      .order('created_at', { ascending: false });

    if(error){
      listContainer.innerHTML = '<div class="empty">Could not load leads: ' + error.message + '</div>';
      return;
    }

    allLeads = data;
    renderLeadFilters();
    renderLeadList();
  }

  function renderLeadCard(lead){
    const card = document.createElement('div');
    card.className = 'card lead-card' + (expandedLeadIds.has(lead.id) ? ' expanded' : '');
    card.dataset.leadId = lead.id;
    const typeLabel = { storage: 'Storage facility', church: 'Church', gym: 'Gym', other: 'Other' }[lead.business_type] || '—';
    const locationBits = [typeLabel, lead.city].filter(Boolean).join(' · ');
    card.innerHTML = `
      <div class="card-top lead-summary" data-toggle="1">
        <div>
          <h3>${lead.business_name}</h3>
          <div class="meta">${locationBits || '—'}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="status ${lead.status}">${LEAD_STATUS_LABELS[lead.status]}</span>
          <span class="lead-caret">▾</span>
        </div>
      </div>

      <div class="lead-details">
        <div class="meta" style="margin-bottom:10px;">
          ${lead.address ? lead.address + '<br>' : ''}
          ${lead.contact_name ? lead.contact_name + ' · ' : ''}${lead.phone ? lead.phone + ' · ' : ''}${lead.email || ''}<br>
          Last touch: ${lead.last_touch_date || 'never'}
        </div>

        <div class="edit-grid">
          <div>
            <label>Status</label>
            <select class="f-lead-status" data-id="${lead.id}">
              ${LEAD_STATUSES.map(s => `<option value="${s}" ${s === lead.status ? 'selected' : ''}>${LEAD_STATUS_LABELS[s]}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>Last touch date</label>
            <input type="date" class="f-lead-touch" data-id="${lead.id}" value="${lead.last_touch_date || ''}">
          </div>
          <div class="full">
            <label>Notes</label>
            <textarea class="f-lead-notes" data-id="${lead.id}" rows="2">${lead.notes || ''}</textarea>
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-quick" data-id="${lead.id}" data-touch-today="1">Mark Contacted Today</button>
          <button class="btn-approve" data-id="${lead.id}" data-save="1">Save Changes</button>
          <button class="btn-reject" data-id="${lead.id}" data-delete="1">Delete</button>
        </div>
      </div>
    `;
    return card;
  }

  function attachLeadCardListeners(){
    document.querySelectorAll('.lead-summary').forEach(summary => {
      summary.addEventListener('click', () => {
        const card = summary.closest('.lead-card');
        const id = card.dataset.leadId;
        if(expandedLeadIds.has(id)){
          expandedLeadIds.delete(id);
        } else {
          expandedLeadIds.add(id);
        }
        card.classList.toggle('expanded');
      });
    });

    document.querySelectorAll('[data-touch-today="1"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const today = new Date().toISOString().slice(0, 10);
        const card = btn.closest('.lead-card');
        const status = card.querySelector('.f-lead-status').value;
        const nextStatus = status === 'not_contacted' ? 'contacted' : status;
        const { error } = await supabaseClient
          .from('host_leads')
          .update({ last_touch_date: today, status: nextStatus, updated_at: new Date().toISOString() })
          .eq('id', id);
        if(error){ alert('Update failed: ' + error.message); return; }
        loadHostLeads();
      });
    });

    document.querySelectorAll('[data-save="1"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const card = btn.closest('.lead-card');
        const status = card.querySelector('.f-lead-status').value;
        const last_touch_date = card.querySelector('.f-lead-touch').value || null;
        const notes = card.querySelector('.f-lead-notes').value.trim() || null;
        const { error } = await supabaseClient
          .from('host_leads')
          .update({ status, last_touch_date, notes, updated_at: new Date().toISOString() })
          .eq('id', id);
        if(error){ alert('Update failed: ' + error.message); return; }
        loadHostLeads();
      });
    });

    document.querySelectorAll('[data-delete="1"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if(!confirm('Delete this lead?')) return;
        const id = btn.dataset.id;
        const { error } = await supabaseClient.from('host_leads').delete().eq('id', id);
        if(error){ alert('Delete failed: ' + error.message); return; }
        loadHostLeads();
      });
    });
  }

  checkSession();
</script>

</body>
</html>
